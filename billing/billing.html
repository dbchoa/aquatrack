<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Central - AquaTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        water: '#4facfe', 
                        waterDark: '#0072ff',
                        electric: '#4facfe',
                        warning: '#f59e0b'
                    },
                    borderRadius: { '32': '32px', '48': '48px' }
                }
            }
        }
    </script>
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    
    <style>
        .stat-glow { text-shadow: 0 0 15px rgba(79, 172, 254, 0.4); }
        .glass-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.9);
            backdrop-blur: 12px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(79, 172, 254, 0.4);
            box-shadow: inset 0 0 12px rgba(79, 172, 254, 0.05);
        }
        .dash-row { transition: all 0.2s ease; }
        .dash-row:hover { background: rgba(79, 172, 254, 0.05); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        #toast-container { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); z-index: 999; pointer-events: none; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-[#020617] font-sans text-slate-900 dark:text-slate-100 transition-colors duration-300">
    
    <header id="header-container"></header>
    <div id="toast-container"></div>

    <main class="max-w-full h-screen flex flex-col overflow-hidden bg-slate-50 dark:bg-[#020617]">
        <div class="grid grid-cols-3 gap-0 bg-white dark:bg-slate-900 border-b border-water/20">
            <button onclick="filterBy('today')" class="p-6 border-r border-water/10 hover:bg-water/5 transition-colors group text-left">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest group-hover:text-emerald-500 transition-colors">Daily Collection</p>
                <h4 id="hud-daily" class="text-2xl font-black text-emerald-500 stat-glow">₱ 0.00</h4>
            </button>
            <button onclick="filterBy('pending')" class="p-6 border-r border-water/10 hover:bg-water/5 transition-colors group text-left">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest group-hover:text-amber-500 transition-colors">Pending Arrears</p>
                <h4 id="hud-pending" class="text-2xl font-black text-amber-500">₱ 0.00</h4>
            </button>
            <div class="p-6 flex justify-between items-center bg-waterDark/5">
                <div>
                    <p class="text-[9px] font-black text-waterDark dark:text-water uppercase tracking-widest">Cycle Efficiency</p>
                    <h4 id="display-efficiency-pct" class="text-2xl font-black text-slate-900 dark:text-white">0%</h4>
                </div>
                <button onclick="handleExcelExport()" class="w-12 h-12 rounded-2xl bg-white dark:bg-slate-800 shadow-lg flex items-center justify-center text-emerald-500 active:scale-90 transition-all">
                    <i class="bi bi-file-earmark-spreadsheet-fill text-xl"></i>
                </button>
            </div>
        </div>
    
        <div class="flex-1 flex overflow-hidden">
            <div class="flex-1 flex flex-col min-w-0">
                <div class="p-4 bg-white dark:bg-slate-900/50 flex gap-4">
                    <div class="flex-1 relative">
                        <i class="bi bi-search absolute left-4 top-1/2 -translate-y-1/2 opacity-30"></i>
                        <input id="search-input" type="text" placeholder="Search by name, serial, or street..." 
                               class="w-full pl-12 pr-4 py-4 bg-slate-100 dark:bg-slate-800 rounded-2xl text-sm font-bold outline-none focus:ring-2 ring-water/40 border-none">
                    </div>
                    <select id="filter-cycle" class="bg-slate-100 dark:bg-slate-800 px-6 rounded-2xl text-xs font-black outline-none border-none"></select>
                </div>
    
                <div class="flex-1 overflow-y-auto p-4 space-y-3" id="ledger-container">
                    </div>
            </div>
    
            <div class="w-96 bg-white dark:bg-slate-900 border-l border-water/20 overflow-y-auto hidden lg:block" id="intel-sidebar">
                <div id="intel-empty" class="h-full flex flex-col items-center justify-center p-10 text-center opacity-20">
                    <i class="bi bi-lightning-charge text-6xl mb-4"></i>
                    <p class="font-black uppercase tracking-tighter text-xs">Select an account to view intelligence & history</p>
                </div>
                <div id="intel-content" class="hidden p-8">
                    </div>
            </div>
        </div>
    </main>

    <div id="paymentModal" class="hidden fixed inset-0 z-[500] bg-black/60 backdrop-blur-sm flex items-start md:items-center justify-center p-6 pt-24 md:pt-6">
        <div class="bg-white/95 dark:bg-slate-900/90 backdrop-blur-2xl w-full max-w-sm rounded-[2.5rem] p-8 border border-white dark:border-white/10 shadow-2xl relative overflow-hidden">
            <h3 class="text-xl font-bold mb-2 text-center uppercase tracking-tight">Record Payment</h3>
            <p id="pay-address" class="text-[10px] text-center font-black text-waterDark uppercase tracking-[0.2em] mb-8">---</p>
            
            <div class="mb-8 text-center bg-slate-100 dark:bg-slate-800/50 p-6 rounded-3xl">
                <p id="pay-account-name" class="font-bold text-slate-500 text-xs uppercase mb-1">---</p>
                <p id="pay-amount" class="text-3xl font-black text-emerald-600 tracking-tighter">₱ 0.00</p>
            </div>
            
            <div class="mb-8">
                <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block ml-2">Date Received</label>
                <input id="pay-date" type="date" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl outline-none font-bold text-sm">
            </div>
            
            <div class="flex flex-col gap-2">
                <button id="btn-confirm-pay" onclick="confirmPayment()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg shadow-emerald-600/20 active:scale-95 transition-all">Submit Payment</button>
                <button onclick="closePaymentModal()" class="w-full py-3 text-slate-500 font-bold uppercase text-[10px] tracking-widest text-center">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>

    <script type="module">
        import { injectHeader } from '../js/header-component.js';
        import { db, auth } from '../js/firebase-init.js';
        import { toast, formatCurrency } from '../js/utils.js';

        injectHeader();

        let allReadings = [];
        let activeReading = null;

        const calculateAmount = (r) => {
            const consumption = Math.max(0, r.reading - r.prevReading);
            const { threshold, minFee, excessRate } = r.appliedRates;
            return consumption <= threshold ? minFee : minFee + ((consumption - threshold) * excessRate);
        };

        const renderTable = () => {
            const container = document.getElementById('report-body');
            const search = document.getElementById('search-input').value.toLowerCase();
            const cycle = document.getElementById('filter-cycle').value;
            const status = document.getElementById('filter-status').value;
            
            container.innerHTML = '';
            const filtered = allReadings.filter(r => {
                const matchesSearch = r.locationAddress.toLowerCase().includes(search);
                const matchesCycle = r.billingCycle === cycle;
                const matchesStatus = status === 'all' || r.status === status;
                return matchesSearch && matchesCycle && matchesStatus;
            });

            updateHUD(filtered, cycle);

            filtered.forEach(r => {
                const amount = calculateAmount(r);
                const tr = document.createElement('tr');
                tr.className = "dash-row";
                tr.innerHTML = `
                    <td class="p-5">
                        <p class="font-black text-slate-900 dark:text-white uppercase tracking-tighter">${r.locationAddress}</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Reader: ${r.readerName}</p>
                    </td>
                    <td class="p-5 text-center font-mono font-bold text-xs">
                        ${(r.reading - r.prevReading).toFixed(1)} <span class="opacity-40">m³</span>
                    </td>
                    <td class="p-5 text-right font-black text-slate-900 dark:text-white">
                        ${formatCurrency(amount)}
                    </td>
                    <td class="p-5 text-center">
                        <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tighter ${r.status === 'paid' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">
                            ${r.status}
                        </span>
                    </td>
                    <td class="p-5 text-right">
                        <button onclick="openPaymentModal('${r.readingId}')" class="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 active:scale-90 transition-transform">
                            <i class="bi ${r.status === 'paid' ? 'bi-arrow-left-right' : 'bi-cash-stack text-emerald-500'}"></i>
                        </button>
                    </td>
                `;
                container.appendChild(tr);
            });
        };

        const updateHUD = (filteredList, activeCycle) => {
            const cycleData = allReadings.filter(r => r.billingCycle === activeCycle);
            let totalExpected = 0; let totalCollected = 0; let unpaidCount = 0;

            cycleData.forEach(r => {
                const amt = calculateAmount(r);
                totalExpected += amt;
                if (r.status === 'paid') totalCollected += amt;
                else unpaidCount++;
            });

            const efficiency = totalExpected > 0 ? Math.round((totalCollected / totalExpected) * 100) : 0;
            document.getElementById('display-efficiency-pct').innerHTML = `${efficiency}<span class="text-lg opacity-50 ml-1">%</span>`;
            document.getElementById('efficiency-bar').style.width = `${efficiency}%`;
            document.getElementById('display-collected-amount').innerText = `${formatCurrency(totalCollected)} Collected`;
            document.getElementById('hud-receivables').innerText = formatCurrency(totalExpected - totalCollected);
            document.getElementById('hud-unpaid-units').innerText = `${unpaidCount} Units`;
        };

        window.handleExcelExport = () => {
            const cycle = document.getElementById('filter-cycle').value;
            const data = allReadings.filter(r => r.billingCycle === cycle).map(r => ({
                Address: r.locationAddress,
                Consumption: (r.reading - r.prevReading).toFixed(1),
                Amount: calculateAmount(r),
                Status: r.status,
                PaidDate: r.paidDate || 'Unpaid'
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Billing");
            XLSX.writeFile(wb, `AquaTrack_Billing_${cycle}.xlsx`);
        };

        window.openPaymentModal = (id) => {
            activeReading = allReadings.find(r => r.readingId === id);
            document.getElementById('pay-address').innerText = activeReading.locationAddress;
            document.getElementById('pay-account-name').innerText = `Capturer: ${activeReading.readerName}`;
            document.getElementById('pay-amount').innerText = formatCurrency(calculateAmount(activeReading));
            document.getElementById('pay-date').value = new Date().toISOString().slice(0, 10);
            document.getElementById('paymentModal').classList.remove('hidden');
        };

        window.closePaymentModal = () => document.getElementById('paymentModal').classList.add('hidden');

        window.confirmPayment = async () => {
            const btn = document.getElementById('btn-confirm-pay');
            const date = document.getElementById('pay-date').value;
            const isSettling = activeReading.status !== 'paid';

            try {
                btn.disabled = true;
                await db.ref(`readings/${activeReading.readingId}`).update({
                    status: isSettling ? 'paid' : 'pending',
                    paidDate: isSettling ? date : null
                });
                toast("Status Updated", "success");
                closePaymentModal();
            } catch (e) { toast("Update Failed", "error"); }
            finally { btn.disabled = false; }
        };

        // --- Standard Auth/DB Logic ---
        auth.onAuthStateChanged(user => {
            if (!user) return window.location.replace('../index.html');
            document.getElementById('staff-name-display').innerText = sessionStorage.getItem('aqt_user_name') || "Billing Staff";
            
            db.ref('readings').on('value', snap => {
                if(snap.exists()) {
                    allReadings = Object.values(snap.val());
                    const cycles = [...new Set(allReadings.map(r => r.billingCycle))].sort().reverse();
                    const select = document.getElementById('filter-cycle');
                    const current = select.value;
                    select.innerHTML = cycles.map(c => `<option value="${c}">${c}</option>`).join('');
                    if (current) select.value = current;
                    renderTable();
                }
            });
        });

        // Search & Filter event mapping
        document.getElementById('search-input').oninput = renderTable;
        document.getElementById('filter-cycle').onchange = renderTable;
        document.getElementById('filter-status').onchange = renderTable;

        // Security block placeholder
        window.openPasswordModal = () => toast("Security under maintenance", "info");
    </script>
</body>
</html>
