<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Command - AquaTrack v2.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { water: '#4facfe', waterDark: '#0072ff', warning: '#f59e0b' },
                    borderRadius: { '32': '32px', '48': '48px' }
                }
            }
        }
    </script>
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    
    <style>
        .stat-glow { text-shadow: 0 0 15px rgba(79, 172, 254, 0.4); }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-blur: 12px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(79, 172, 254, 0.2);
        }

        /* Custom Select Hijack */
        .custom-select-trigger {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            user-select: none;
            border: 2px solid transparent;
        }
        .custom-select-trigger.is-open { border: 2px solid #4facfe !important; }
        
        .select-dropdown-panel {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            width: 100%;
            background: white;
            backdrop-blur: 24px;
            border: 1px solid #4facfe;
            border-radius: 18px;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            transform-origin: top;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .dark .select-dropdown-panel { background: #0f172a; }
        .select-option {
            padding: 12px 20px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: #64748b;
            transition: all 0.1s ease;
        }
        .select-option:hover { background: #4facfe; color: white; }
        .select-option.is-selected { color: #4facfe; background: rgba(79, 172, 254, 0.1); }

        .kpi-btn { transition: all 0.2s ease; border-right: 1px solid rgba(79, 172, 254, 0.1); }
        .kpi-btn:hover { background: rgba(79, 172, 254, 0.05); }

        #toast-container { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); z-index: 999; pointer-events: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#020617] font-sans text-slate-900 dark:text-slate-100 transition-colors duration-300">
    
    <header id="header-container"></header>
    <div id="toast-container"></div>

    <main class="max-w-full h-screen flex flex-col overflow-hidden">
        <div class="grid grid-cols-3 gap-0 bg-white dark:bg-slate-900 border-b border-water/20">
            <button onclick="setFilterStatus('paid')" class="kpi-btn p-6 group text-left">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest group-hover:text-emerald-500">Today's Collection</p>
                <h4 id="hud-daily" class="text-2xl font-black text-emerald-500 stat-glow">₱ 0.00</h4>
            </button>
            <button onclick="setFilterStatus('pending')" class="kpi-btn p-6 group text-left">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest group-hover:text-amber-500">Pending Receivables</p>
                <h4 id="hud-pending" class="text-2xl font-black text-amber-500">₱ 0.00</h4>
            </button>
            <div class="p-6 flex justify-between items-center bg-water/5">
                <div>
                    <p class="text-[9px] font-black text-waterDark uppercase tracking-widest">Efficiency</p>
                    <h4 id="display-efficiency-pct" class="text-2xl font-black">0%</h4>
                </div>
                <button onclick="handleExcelExport()" class="w-12 h-12 rounded-2xl bg-white dark:bg-slate-800 shadow-lg flex items-center justify-center text-emerald-500 active:scale-95 transition-all">
                    <i class="bi bi-file-earmark-spreadsheet-fill text-xl"></i>
                </button>
            </div>
        </div>

        <div class="p-4 bg-white dark:bg-slate-900/50 flex gap-4 items-end border-b border-water/10">
            <div class="flex-1 flex flex-col">
                <label class="text-[9px] font-black text-slate-400 uppercase mb-1 block tracking-tighter ml-2">Search Ledger (Name/Serial/Address)</label>
                <div class="relative h-[48px] group">
                    <div class="absolute left-4 inset-y-0 flex items-center pointer-events-none">
                        <i class="bi bi-search text-slate-400 group-focus-within:text-water"></i>
                    </div>
                    <input id="search-input" type="text" placeholder="Search..." 
                           class="w-full h-full pl-11 pr-4 bg-slate-100 dark:bg-slate-800 rounded-2xl text-sm font-bold outline-none focus:ring-2 ring-water/40 border-none transition-all">
                </div>
            </div>

            <div class="relative w-48 flex flex-col" id="cycle-select-wrapper">
                <label class="text-[9px] font-black text-slate-400 uppercase mb-1 block tracking-tighter ml-2">Billing Cycle</label>
                <div id="cycle-trigger" onclick="toggleCycleDropdown()" 
                     class="custom-select-trigger flex items-center justify-between px-5 rounded-2xl h-[48px] bg-slate-100 dark:bg-slate-800 border-none">
                    <span id="selected-cycle-label" class="text-xs font-black uppercase">---</span>
                    <i class="bi bi-chevron-down opacity-50 text-[10px]"></i>
                </div>
                <input type="hidden" id="filter-cycle" value="">
                <div id="cycle-options" class="select-dropdown-panel hidden scale-95 opacity-0"></div>
            </div>
        </div>

        <div class="flex-1 flex overflow-hidden">
            <div class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50 dark:bg-black/20" id="ledger-container">
                </div>

            <div class="w-96 bg-white dark:bg-slate-900 border-l border-water/20 overflow-y-auto hidden lg:block" id="intel-sidebar">
                <div id="intel-empty" class="h-full flex flex-col items-center justify-center p-10 text-center opacity-20">
                    <i class="bi bi-lightning-charge text-6xl mb-4"></i>
                    <p class="font-black uppercase tracking-tighter text-xs">Select Unit to process</p>
                </div>
                <div id="intel-content" class="hidden p-8"></div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>

    <script type="module">
        import { injectHeader } from '../js/header-component.js';
        import { db, auth } from '../js/firebase-init.js';
        import { toast, formatCurrency } from '../js/utils.js';

        injectHeader();

        let allReadings = [];
        let unitsMap = {}; // Cache for Unit labels/serials
        let activeReading = null;
        let currentFilterStatus = 'all';

        const calculateAmount = (r) => {
            if(!r.appliedRates) return 0;
            const consumption = Math.max(0, r.reading - r.prevReading);
            const { threshold, minFee, excessRate } = r.appliedRates;
            return consumption <= threshold ? minFee : minFee + ((consumption - threshold) * excessRate);
        };

        const renderLedger = () => {
            const container = document.getElementById('ledger-container');
            const search = document.getElementById('search-input').value.toLowerCase();
            const cycle = document.getElementById('filter-cycle').value;
            
            container.innerHTML = '';
            const filtered = allReadings.filter(r => {
                const unit = unitsMap[r.unitId] || {};
                const matchesSearch = r.locationAddress.toLowerCase().includes(search) || 
                                     (unit.meterSerial && unit.meterSerial.toString().includes(search)) ||
                                     (r.readerName && r.readerName.toLowerCase().includes(search));
                const matchesCycle = r.billingCycle === cycle;
                const matchesStatus = currentFilterStatus === 'all' || r.status === currentFilterStatus;
                return matchesSearch && matchesCycle && matchesStatus;
            });

            updateKPIs(allReadings.filter(r => r.billingCycle === cycle));

            filtered.forEach(r => {
                const amount = calculateAmount(r);
                const isPaid = r.status === 'paid';
                const unit = unitsMap[r.unitId] || {};
                
                const card = document.createElement('div');
                card.className = `glass-card p-4 rounded-2xl flex items-center justify-between cursor-pointer hover:scale-[1.01] active:scale-95 transition-all ${activeReading?.readingId === r.readingId ? 'ring-2 ring-water' : ''}`;
                card.onclick = () => selectUnit(r);

                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center ${isPaid ? 'bg-emerald-500/10 text-emerald-500' : 'bg-amber-500/10 text-amber-500'}">
                            <i class="bi ${isPaid ? 'bi-check-circle-fill' : 'bi-clock-history'}"></i>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <p class="text-xs font-black uppercase tracking-tighter">${r.locationAddress}</p>
                                <span class="text-[8px] bg-water/10 text-waterDark px-1.5 py-0.5 rounded font-black uppercase">${unit.unitLabel || 'Unit'}</span>
                            </div>
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">SN: ${unit.meterSerial || 'N/A'}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-black ${isPaid ? 'text-emerald-600' : 'text-slate-900 dark:text-white'}">${formatCurrency(amount)}</p>
                        <p class="text-[8px] font-black uppercase opacity-50">${r.status}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        };

        const selectUnit = (r) => {
            activeReading = r;
            const sidebar = document.getElementById('intel-content');
            const empty = document.getElementById('intel-empty');
            sidebar.classList.remove('hidden'); empty.classList.add('hidden');

            const amount = calculateAmount(r);
            const isPaid = r.status === 'paid';
            const unit = unitsMap[r.unitId] || {};

            sidebar.innerHTML = `
                <div class="animate-in fade-in slide-in-from-right-4 duration-300">
                    <div class="mb-6">
                        <h2 class="text-2xl font-black uppercase tracking-tighter leading-none">${r.locationAddress}</h2>
                        <p class="text-[10px] font-black text-waterDark uppercase tracking-[0.2em] mt-2">${unit.unitLabel || 'Standard Unit'} / Cycle ${r.billingCycle}</p>
                    </div>
                    
                    <div class="space-y-4 mb-8">
                        <div class="bg-slate-100 dark:bg-slate-800/50 p-5 rounded-2xl">
                            <p class="text-[9px] font-black text-slate-400 uppercase mb-3 tracking-widest">Bill Calculation</p>
                            <div class="flex justify-between text-xs font-bold"><span>Present</span><span>${r.reading.toFixed(1)} m³</span></div>
                            <div class="flex justify-between text-xs font-bold opacity-50 mt-1"><span>Previous</span><span>${r.prevReading.toFixed(1)} m³</span></div>
                            <div class="border-t border-slate-200 dark:border-slate-700 mt-2 pt-2 flex justify-between font-black text-waterDark">
                                <span>Consumption</span><span>${(r.reading - r.prevReading).toFixed(1)} m³</span>
                            </div>
                        </div>

                        <div class="${isPaid ? 'bg-emerald-500/10 border-emerald-500/20' : 'bg-amber-500/10 border-amber-500/20'} p-5 rounded-2xl border">
                            <p class="text-[9px] font-black uppercase mb-1 tracking-widest ${isPaid ? 'text-emerald-600' : 'text-amber-600'}">Total Due</p>
                            <h3 class="text-3xl font-black tracking-tighter ${isPaid ? 'text-emerald-600' : 'text-slate-900 dark:text-white'}">${formatCurrency(amount)}</h3>
                            ${isPaid ? `<p class="text-[9px] font-bold text-emerald-600 uppercase mt-2">Received: ${r.paidDate}</p>` : ''}
                        </div>
                    </div>

                    <button onclick="processPayment()" 
                            class="w-full py-4 ${isPaid ? 'bg-slate-200 dark:bg-slate-800 text-slate-500' : 'bg-emerald-600 text-white shadow-xl shadow-emerald-600/20'} rounded-2xl font-black uppercase text-xs tracking-widest active:scale-95 transition-all">
                        ${isPaid ? 'Undo Payment' : 'Mark as Paid'}
                    </button>
                </div>
            `;
            renderLedger(); // Refresh highlights
        };

        window.processPayment = async () => {
            const isSettling = activeReading.status !== 'paid';
            const date = new Date().toISOString().slice(0, 10);
            try {
                await db.ref(`readings/${activeReading.readingId}`).update({
                    status: isSettling ? 'paid' : 'pending',
                    paidDate: isSettling ? date : null
                });
                toast(isSettling ? "Payment Saved" : "Status Reset", "success");
            } catch (e) { toast("Error", "error"); }
        };

        const updateKPIs = (cycleData) => {
            let expected = 0; let collected = 0;
            const today = new Date().toISOString().slice(0, 10);
            cycleData.forEach(r => {
                const amt = calculateAmount(r);
                expected += amt;
                if (r.status === 'paid') collected += amt;
            });
            const daily = allReadings.filter(r => r.status === 'paid' && r.paidDate === today)
                                     .reduce((acc, curr) => acc + calculateAmount(child), 0);
            
            document.getElementById('hud-daily').innerText = formatCurrency(daily);
            document.getElementById('hud-pending').innerText = formatCurrency(expected - collected);
            document.getElementById('display-efficiency-pct').innerText = `${expected > 0 ? Math.round((collected/expected)*100) : 0}%`;
        };

        window.toggleCycleDropdown = () => {
            const panel = document.getElementById('cycle-options');
            const trigger = document.getElementById('cycle-trigger');
            const isOpen = !panel.classList.contains('hidden');
            if (isOpen) {
                panel.classList.add('scale-95', 'opacity-0');
                setTimeout(() => panel.classList.add('hidden'), 200);
                trigger.classList.remove('is-open');
            } else {
                panel.classList.remove('hidden');
                setTimeout(() => panel.classList.remove('scale-95', 'opacity-0'), 10);
                trigger.classList.add('is-open');
            }
        };

        window.selectCycleOption = (cycle) => {
            document.getElementById('filter-cycle').value = cycle;
            document.getElementById('selected-cycle-label').innerText = cycle;
            window.toggleCycleDropdown(); renderLedger();
        };

        window.setFilterStatus = (status) => {
            currentFilterStatus = (currentFilterStatus === status) ? 'all' : status;
            toast(`Filter: ${currentFilterStatus.toUpperCase()}`, "info"); renderLedger();
        };

        window.handleExcelExport = () => {
            const cycle = document.getElementById('filter-cycle').value;
            const data = allReadings.filter(r => r.billingCycle === cycle).map(r => ({
                Address: r.locationAddress,
                Unit: (unitsMap[r.unitId] || {}).unitLabel || 'Standard',
                Usage: (r.reading - r.prevReading).toFixed(1),
                Amount: calculateAmount(r),
                Status: r.status,
                PaidDate: r.paidDate || 'N/A'
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Collection");
            XLSX.writeFile(wb, `AquaTrack_v2.2_${cycle}.xlsx`);
        };

        auth.onAuthStateChanged(user => {
            if (!user) return window.location.replace('../index.html');
            
            // Sync Units first for labels/serials
            db.ref('Unit').on('value', uSnap => {
                if(uSnap.exists()) unitsMap = uSnap.val();
            });

            db.ref('readings').on('value', snap => {
                if(snap.exists()) {
                    allReadings = Object.values(snap.val());
                    const cycles = [...new Set(allReadings.map(r => r.billingCycle))].sort().reverse();
                    const optionsContainer = document.getElementById('cycle-options');
                    const hiddenInput = document.getElementById('filter-cycle');
                    const label = document.getElementById('selected-cycle-label');

                    if (!hiddenInput.value && cycles.length > 0) {
                        hiddenInput.value = cycles[0]; label.innerText = cycles[0];
                    }

                    optionsContainer.innerHTML = cycles.map(c => `
                        <div class="select-option ${hiddenInput.value === c ? 'is-selected' : ''}" 
                             onclick="selectCycleOption('${c}')">${c}</div>
                    `).join('');

                    renderLedger();
                    if(activeReading) {
                        const updated = allReadings.find(r => r.readingId === activeReading.readingId);
                        if(updated) selectUnit(updated);
                    }
                }
            });
        });

        document.getElementById('search-input').oninput = renderLedger;
    </script>
</body>
</html>
