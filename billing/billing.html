<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billing Command - AquaTrack v2.2</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<script>
tailwind.config = {
    darkMode: 'class',
    theme: {
        extend: {
            colors: { water: '#4facfe', waterDark: '#0072ff', warning: '#f59e0b' },
            borderRadius: { '32': '32px', '48': '48px' }
        }
    }
}
</script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
.stat-glow { text-shadow: 0 0 15px rgba(79, 172, 254, 0.4); }
.glass-card {
    background: rgba(255, 255, 255, 0.9);
    backdrop-blur: 12px;
    border: 1px solid rgba(255, 255, 255, 0.5);
}
.dark .glass-card {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(79, 172, 254, 0.2);
}
.custom-select-trigger {
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    position: relative;
    user-select: none;
    border: 2px solid transparent;
}
.custom-select-trigger.is-open { border: 2px solid #4facfe !important; }
.select-dropdown-panel {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    width: 100%;
    background: white;
    border: 1px solid #4facfe;
    border-radius: 18px;
    z-index: 1000;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    overflow: hidden;
    transform-origin: top;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.dark .select-dropdown-panel { background: #0f172a; }
.select-option {
    padding: 12px 20px;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    color: #64748b;
    transition: all 0.1s ease;
}
.select-option:hover { background: #4facfe; color: white; }
.select-option.is-selected { color: #4facfe; background: rgba(79, 172, 254, 0.1); }

/* KPI bar — active filter highlight */
.kpi-btn {
    transition: all 0.2s ease;
    border-right: 1px solid rgba(79, 172, 254, 0.1);
    position: relative;
}
.kpi-btn:hover { background: rgba(79, 172, 254, 0.05); }
.kpi-btn.is-active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 2px 2px 0 0;
}
.kpi-btn.is-active-paid::after     { background: #10b981; }
.kpi-btn.is-active-pending::after  { background: #f59e0b; }
.kpi-btn.is-active-mtd::after      { background: #4facfe; }
.kpi-btn.is-active-ytd::after      { background: #0072ff; }

#toast-container { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); z-index: 999; pointer-events: none; }

.search-mode-btn {
    padding: 6px 16px; border-radius: 12px;
    font-size: 9px; font-weight: 900;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: #64748b; background: transparent;
    transition: all 0.2s ease;
}
.search-mode-btn.is-active { background: #4facfe; color: white; box-shadow: 0 4px 12px rgba(79, 172, 254, 0.3); }

.segmented-control {
    background: rgba(0,0,0,0.05);
    padding: 3px; border-radius: 14px;
    display: flex; gap: 2px;
}
.dark .segmented-control { background: rgba(255,255,255,0.05); }
.segment-btn {
    flex: 1; padding: 8px 0;
    font-size: 9px; font-weight: 900;
    text-transform: uppercase; letter-spacing: 0.05em;
    color: #64748b; border-radius: 11px;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    white-space: nowrap;
}
.segment-btn.is-active { background: #4facfe; color: white; box-shadow: 0 4px 12px rgba(79,172,254,0.2); }

/* Arrears view */
.arrears-group { transition: all 0.2s ease; }
.arrears-children { overflow: hidden; transition: max-height 0.25s cubic-bezier(0.4, 0, 0.2, 1); max-height: 0; }
.arrears-children.is-open { max-height: 1000px; }
.arrears-group-header { cursor: pointer; }
.arrears-group-header:hover { background: rgba(79, 172, 254, 0.04); }

/* Skeleton loader */
@keyframes shimmer {
    0%   { background-position: -600px 0; }
    100% { background-position: 600px 0; }
}
.skeleton {
    background: linear-gradient(90deg, rgba(79,172,254,0.05) 25%, rgba(79,172,254,0.12) 50%, rgba(79,172,254,0.05) 75%);
    background-size: 600px 100%;
    animation: shimmer 1.4s infinite linear;
    border-radius: 16px;
}

/* Bottom sheet for mobile sidebar */
#mobile-sheet {
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
}
#mobile-sheet.is-open { transform: translateY(0); }
#mobile-sheet-backdrop {
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
}
#mobile-sheet-backdrop.is-open { opacity: 1; pointer-events: auto; }

/* Scrollbars */
#ledger-container::-webkit-scrollbar,
main::-webkit-scrollbar,
#intel-sidebar::-webkit-scrollbar,
#mobile-sheet::-webkit-scrollbar { width: 6px; height: 6px; }
#ledger-container::-webkit-scrollbar-track,
main::-webkit-scrollbar-track,
#intel-sidebar::-webkit-scrollbar-track,
#mobile-sheet::-webkit-scrollbar-track { background: transparent; }
#ledger-container::-webkit-scrollbar-thumb,
main::-webkit-scrollbar-thumb,
#intel-sidebar::-webkit-scrollbar-thumb,
#mobile-sheet::-webkit-scrollbar-thumb { background: rgba(79,172,254,0.2); border-radius: 20px; }
#ledger-container::-webkit-scrollbar-thumb:hover,
main::-webkit-scrollbar-thumb:hover,
#intel-sidebar::-webkit-scrollbar-thumb:hover { background: rgba(79,172,254,0.6); }
.dark #ledger-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
.dark #ledger-container::-webkit-scrollbar-thumb:hover { background: #4facfe; }

body, html { margin: 0; padding: 0; height: 100vh; overflow: hidden; }
main { height: 100vh; display: flex; flex-direction: column; }

#filter-year::-webkit-outer-spin-button,
#filter-year::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
#filter-year { -moz-appearance: textfield; }
</style>
</head>
<body class="bg-slate-50 dark:bg-[#020617] font-sans text-slate-900 dark:text-slate-100 transition-colors duration-300">
<header id="header-container"></header>
<div id="toast-container"></div>

<main class="max-w-full h-screen flex flex-col overflow-hidden">

    <!-- WELCOME BAR -->
    <div class="flex-none flex items-center justify-between px-4 lg:px-6 py-2 bg-white dark:bg-slate-900 border-b border-water/10">
        <div class="flex items-center gap-2">
            <i class="bi bi-person-circle text-water text-sm"></i>
            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Welcome,</span>
            <span id="billing-staff-name" class="text-[9px] font-black text-waterDark dark:text-water uppercase tracking-widest">...</span>
        </div>
        <span class="text-[8px] font-bold text-slate-300 dark:text-slate-600 uppercase tracking-widest">Billing Command</span>
    </div>

    <!-- KPI BAR — 4 columns -->
    <div class="flex-none grid grid-cols-4 gap-0 bg-white dark:bg-slate-900 border-b border-water/20">

        <!-- Today's Collection -->
        <button id="kpi-paid" onclick="setKpiDateFilter('today')" class="kpi-btn p-3 lg:p-5 group text-left">
            <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest group-hover:text-emerald-500 leading-tight">Today's Collection</p>
            <h4 id="hud-daily" class="text-xl lg:text-2xl font-black text-emerald-500 stat-glow mt-1">₱ 0.00</h4>
        </button>

        <!-- MTD -->
        <button id="kpi-mtd" onclick="setKpiDateFilter('mtd')" class="kpi-btn p-3 lg:p-5 group text-left">
            <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest group-hover:text-water leading-tight">Month to Date</p>
            <h4 id="hud-mtd" class="text-xl lg:text-2xl font-black text-water stat-glow mt-1">₱ 0.00</h4>
            <p id="hud-mtd-sub" class="text-[8px] font-bold text-slate-400 mt-0.5">0% · -- / -- units</p>
        </button>

        <!-- YTD -->
        <button id="kpi-ytd" onclick="setKpiDateFilter('ytd')" class="kpi-btn p-3 lg:p-5 group text-left">
            <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest group-hover:text-waterDark leading-tight">Year to Date</p>
            <h4 id="hud-ytd" class="text-xl lg:text-2xl font-black text-waterDark stat-glow mt-1">₱ 0.00</h4>
            <p id="hud-ytd-sub" class="text-[8px] font-bold text-slate-400 mt-0.5">0% · -- / -- units</p>
        </button>

        <!-- Pending Receivables -->
        <button id="kpi-pending" onclick="setFilterStatus('pending')" class="kpi-btn p-3 lg:p-5 group text-left bg-amber-500/5">
            <p id="hud-pending-label" class="text-[8px] font-black text-slate-400 uppercase tracking-widest group-hover:text-amber-500 leading-tight">Cycle Pending</p>
            <h4 id="hud-pending" class="text-xl lg:text-2xl font-black text-amber-500 mt-1">₱ 0.00</h4>
            <p id="hud-pending-sub" class="text-[8px] font-bold text-slate-400 mt-0.5">-- units unpaid</p>
        </button>
    </div>

    <!-- FILTER BAR -->
    <div class="flex-none p-3 lg:p-4 bg-white dark:bg-slate-900/50 border-b border-water/10 space-y-3">

        <!-- Row 1 -->
        <div class="flex items-center gap-2 px-1">
            <div class="segmented-control flex-shrink-0">
                <button onclick="setViewMode('ledger')"  id="btn-view-ledger"  class="segment-btn is-active px-3">Ledger</button>
                <button onclick="setViewMode('arrears')" id="btn-view-arrears" class="segment-btn px-3">Arrears</button>
            </div>
            <div class="w-px h-5 bg-slate-200 dark:bg-slate-700 flex-shrink-0"></div>
            <div class="segmented-control flex-shrink-0 w-56 lg:w-64">
                <button onclick="setSearchMode('address')" id="mode-address" class="search-mode-btn segment-btn is-active">Address</button>
                <button onclick="setSearchMode('serial')"  id="mode-serial"  class="search-mode-btn segment-btn">Serial</button>
                <button onclick="setSearchMode('name')"    id="mode-name"    class="search-mode-btn segment-btn">Name</button>
            </div>
            <div class="w-px h-5 bg-slate-200 dark:bg-slate-700 flex-shrink-0"></div>
            <button onclick="handleExcelExport()" title="Export to Excel"
                class="flex items-center gap-2 h-9 px-3 rounded-2xl bg-slate-100 dark:bg-slate-800 text-emerald-600 dark:text-emerald-400 font-black uppercase text-[9px] tracking-widest active:scale-95 transition-all flex-shrink-0 hover:bg-emerald-50 dark:hover:bg-emerald-900/20">
                <i class="bi bi-file-earmark-spreadsheet-fill text-sm"></i>
                <span class="hidden lg:inline">Export to Excel</span>
            </button>
        </div>

        <!-- Row 2 -->
        <div id="filter-row-controls" class="flex gap-3 items-center">
            <div class="flex-1 relative h-[44px] group">
                <div class="absolute left-4 inset-y-0 flex items-center pointer-events-none">
                    <i id="search-icon" class="bi bi-geo-alt text-slate-400 group-focus-within:text-water transition-colors"></i>
                </div>
                <input id="search-input" type="text" placeholder="Search by address..."
                    class="w-full h-full pl-10 pr-4 bg-slate-100 dark:bg-slate-800 rounded-2xl text-sm font-bold outline-none focus:ring-2 ring-water/40 border-none transition-all">
            </div>
            <div id="time-selector-wrapper" class="flex gap-3 items-center">
                <div class="relative w-40 lg:w-48 h-[44px]">
                    <div id="wrapper-cycle" class="absolute inset-0">
                        <div id="cycle-trigger" onclick="toggleCycleDropdown()" class="custom-select-trigger flex items-center justify-between px-4 rounded-2xl h-full bg-slate-100 dark:bg-slate-800">
                            <span id="selected-cycle-label" class="text-xs font-black uppercase">---</span>
                            <i class="bi bi-chevron-down opacity-50 text-[10px]"></i>
                        </div>
                        <div id="cycle-options" class="select-dropdown-panel hidden"></div>
                    </div>
                    <div id="wrapper-year" class="hidden absolute inset-0">
                        <input id="filter-year" type="number" placeholder="2026"
                            class="w-full h-full px-4 bg-slate-100 dark:bg-slate-800 rounded-2xl text-sm font-black outline-none focus:ring-2 ring-water/40 border-none text-center tracking-[0.3em]">
                    </div>
                </div>
                <div class="segmented-control w-36 flex-shrink-0">
                    <button onclick="setTimeMode('cycle')" id="btn-mode-cycle"    class="segment-btn is-active">Cycle</button>
                    <button onclick="setTimeMode('year')"  id="mode-year-trigger" class="segment-btn">Year</button>
                </div>
            </div>
        </div>
        <input type="hidden" id="filter-cycle" value="">
    </div>

    <!-- LEDGER + SIDEBAR -->
    <div class="flex-1 flex overflow-hidden">
        <div class="flex-1 overflow-y-auto p-3 lg:p-4 space-y-2 bg-slate-50 dark:bg-black/20" id="ledger-container">
            <div id="ledger-skeleton" class="space-y-2">
                <div class="skeleton h-16 w-full"></div>
                <div class="skeleton h-16 w-full"></div>
                <div class="skeleton h-16 w-full"></div>
                <div class="skeleton h-16 w-full opacity-70"></div>
                <div class="skeleton h-16 w-full opacity-40"></div>
            </div>
        </div>
        <div class="w-96 bg-white dark:bg-slate-900 border-l border-water/20 overflow-y-auto hidden lg:block" id="intel-sidebar">

</div>

<!-- MOBILE BOTTOM SHEET -->
<div id="mobile-sheet"
    class="lg:hidden fixed bottom-0 left-0 right-0 z-[500] bg-white dark:bg-slate-900 rounded-t-[2rem] max-h-[85vh] overflow-y-auto shadow-2xl border-t border-water/20">

<!-- CONFIRM MODAL -->

                </div>
                <span id="conf-label" class="bg-water/10 text-waterDark px-2 py-0.5 rounded text-[8px] font-black uppercase"></span>
            </div>
            <div class="border-t border-slate-200 dark:border-slate-700 pt-4 flex justify-between items-end">

                    <p class="text-[8px] font-black text-slate-400 uppercase">Usage</p>
                    <p id="conf-usage" class="text-sm font-black"></p>

<script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>
<script type="module">
import { injectHeader } from '../js/header-component.js';
import { db, auth } from '../js/firebase-init.js';
import { toast, formatCurrency } from '../js/utils.js';

injectHeader();

let allReadings         = [];
let unitsMap            = {};
let activeReading       = null;
let currentFilterStatus = 'all';
let timeMode            = 'cycle';
let timeScopeOverride   = null;
let searchMode          = 'address';
let viewMode            = 'ledger';
let dataLoaded          = false;
let orgConfig           = { name: 'AquaTrack', subname: '' };
let currentBillingStaff = { uid: null, name: 'Staff' };  // set after role guard, used in paidBy

const expandedArrears = new Set();

// ─── BILLING CALCULATION ──────────────────────────────────────────────────────

const calculateAmount = (r) => {
    if (!r.appliedRates) return 0;
    const consumption = Math.max(0, r.reading - r.prevReading);
    const { threshold, minFee, excessRate } = r.appliedRates;
    return consumption <= threshold ? minFee : minFee + ((consumption - threshold) * excessRate);
};

// ─── SEARCH & TIME MODE ───────────────────────────────────────────────────────

window.setSearchMode = (mode) => {
    searchMode = mode;
    document.querySelectorAll('.segmented-control .segment-btn').forEach(btn => {
        if (['mode-address', 'mode-serial', 'mode-name'].includes(btn.id)) {
            btn.classList.toggle('is-active', btn.id === `mode-${mode}`);
        }
    });
    const configs = {
        address: { p: 'Search by address...',      i: 'bi-geo-alt' },
        serial:  { p: 'Search by meter serial...', i: 'bi-hash' },
        name:    { p: 'Search by resident name...', i: 'bi-person-fill' }
    };
    document.getElementById('search-input').placeholder = configs[mode].p;
    document.getElementById('search-icon').className    = `bi ${configs[mode].i} text-slate-400 group-focus-within:text-water transition-colors`;
    renderLedger();
    document.getElementById('search-input').focus();
};

window.setTimeMode = (mode) => {
    timeMode = mode;
    timeScopeOverride = null;
    kpiDateFilter     = null;
    clearKpiActive();
    document.getElementById('wrapper-cycle').classList.toggle('hidden', mode !== 'cycle');
    document.getElementById('wrapper-year').classList.toggle('hidden', mode !== 'year');
    document.getElementById('btn-mode-cycle').classList.toggle('is-active', mode === 'cycle');
    document.getElementById('mode-year-trigger').classList.toggle('is-active', mode === 'year');
    if (mode === 'year' && !document.getElementById('filter-year').value) {
        document.getElementById('filter-year').value = new Date().getFullYear();
    }
    renderLedger();
};

// ─── VIEW MODE ────────────────────────────────────────────────────────────────

window.setViewMode = (mode) => {
    viewMode = mode;
    document.getElementById('btn-view-ledger').classList.toggle('is-active', mode === 'ledger');
    document.getElementById('btn-view-arrears').classList.toggle('is-active', mode === 'arrears');
    document.getElementById('time-selector-wrapper').classList.toggle('hidden', mode === 'arrears');
    if (mode === 'arrears') {
        currentFilterStatus = 'all';
        kpiDateFilter = null;
        clearKpiActive();
        document.getElementById('search-input').value = '';
    }
    renderLedger();
};

// ─── KPI FILTER ───────────────────────────────────────────────────────────────

let kpiDateFilter = null;

const clearKpiActive = () => {
    ['kpi-paid', 'kpi-mtd', 'kpi-ytd', 'kpi-pending'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove('is-active', 'is-active-paid', 'is-active-mtd', 'is-active-ytd', 'is-active-pending');
    });
};

window.setFilterStatus = (status) => {
    if (viewMode === 'arrears') return;
    kpiDateFilter = null;
    clearKpiActive();
    currentFilterStatus = (currentFilterStatus === status) ? 'all' : status;
    if (currentFilterStatus === 'pending') {
        document.getElementById('kpi-pending').classList.add('is-active', 'is-active-pending');
    }
    toast(`Filter: ${currentFilterStatus.toUpperCase()}`, 'info');
    renderLedger();
};

window.setKpiDateFilter = (scope) => {
    if (viewMode === 'arrears') return;
    if (kpiDateFilter === scope) {
        kpiDateFilter = null;
        currentFilterStatus = 'all';
        clearKpiActive();
        renderLedger();
        return;
    }
    kpiDateFilter = scope;
    currentFilterStatus = 'all';
    clearKpiActive();
    const map      = { today: 'kpi-paid', mtd: 'kpi-mtd', ytd: 'kpi-ytd' };
    const classMap = { today: 'is-active-paid', mtd: 'is-active-mtd', ytd: 'is-active-ytd' };
    document.getElementById(map[scope]).classList.add('is-active', classMap[scope]);
    renderLedger();
};

// ─── KPI UPDATE ───────────────────────────────────────────────────────────────

const updateKPIs = () => {
    const pad        = n => String(n).padStart(2, '0');
    const now        = new Date();
    const today      = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
    const thisMonth  = `${now.getFullYear()}-${pad(now.getMonth()+1)}`;
    const thisYear   = now.getFullYear().toString();
    const localDate  = (pd) => { const d = new Date(pd); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
    const localMonth = (pd) => { const d = new Date(pd); return `${d.getFullYear()}-${pad(d.getMonth()+1)}`; };
    const localYear  = (pd) => String(new Date(pd).getFullYear());

    const daily = allReadings
        .filter(r => r.status === 'paid' && r.paidDate && localDate(r.paidDate) === today)
        .reduce((acc, r) => acc + calculateAmount(r), 0);
    document.getElementById('hud-daily').innerText = formatCurrency(daily);

    const mtdReadings  = allReadings.filter(r => r.status === 'paid' && r.paidDate && localMonth(r.paidDate) === thisMonth);
    const mtdBilled    = allReadings.filter(r => r.billingCycle.startsWith(thisMonth));
    const mtdCollected = mtdReadings.reduce((s, r) => s + calculateAmount(r), 0);
    const mtdExpected  = mtdBilled.reduce((s, r) => s + calculateAmount(r), 0);
    const mtdPaidCount = mtdBilled.filter(r => r.status === 'paid').length;
    const mtdTotal     = mtdBilled.length;
    const mtdEff       = mtdExpected > 0 ? Math.round((mtdBilled.filter(r => r.status === 'paid').reduce((s, r) => s + calculateAmount(r), 0) / mtdExpected) * 100) : 0;
    document.getElementById('hud-mtd').innerText     = formatCurrency(mtdCollected);
    document.getElementById('hud-mtd-sub').innerText = `${mtdEff}% · ${mtdPaidCount} / ${mtdTotal} units`;

    const ytdReadings  = allReadings.filter(r => r.status === 'paid' && r.paidDate && localYear(r.paidDate) === thisYear);
    const ytdBilled    = allReadings.filter(r => r.billingCycle.startsWith(thisYear));
    const ytdCollected = ytdReadings.reduce((s, r) => s + calculateAmount(r), 0);
    const ytdExpected  = ytdBilled.reduce((s, r) => s + calculateAmount(r), 0);
    const ytdPaidCount = ytdBilled.filter(r => r.status === 'paid').length;
    const ytdTotal     = ytdBilled.length;
    const ytdEff       = ytdExpected > 0 ? Math.round((ytdBilled.filter(r => r.status === 'paid').reduce((s, r) => s + calculateAmount(r), 0) / ytdExpected) * 100) : 0;
    document.getElementById('hud-ytd').innerText     = formatCurrency(ytdCollected);
    document.getElementById('hud-ytd-sub').innerText = `${ytdEff}% · ${ytdPaidCount} / ${ytdTotal} units`;

    const cycle = document.getElementById('filter-cycle').value;
    const year  = document.getElementById('filter-year').value || thisYear;
    let pendingScope, pendingLabel;
    if (timeMode === 'cycle') {
        pendingScope  = allReadings.filter(r => r.billingCycle === cycle && r.status === 'pending');
        pendingLabel  = `${cycle || 'Cycle'} Pending`;
    } else if (timeScopeOverride === 'mtd') {
        pendingScope  = allReadings.filter(r => r.billingCycle.startsWith(thisMonth) && r.status === 'pending');
        pendingLabel  = 'MTD Pending';
    } else {
        pendingScope  = allReadings.filter(r => r.billingCycle.startsWith(year) && r.status === 'pending');
        pendingLabel  = `${year} Pending`;
    }
    const pendingTotal = pendingScope.reduce((s, r) => s + calculateAmount(r), 0);
    document.getElementById('hud-pending-label').innerText = pendingLabel;
    document.getElementById('hud-pending').innerText       = formatCurrency(pendingTotal);
    document.getElementById('hud-pending-sub').innerText   = `${pendingScope.length} unit${pendingScope.length !== 1 ? 's' : ''} unpaid`;
};

// ─── ARREARS RENDER ───────────────────────────────────────────────────────────

const renderArrears = () => {
    const container = document.getElementById('ledger-container');
    const skeleton  = document.getElementById('ledger-skeleton');
    if (skeleton) skeleton.remove();
    container.innerHTML = '';
    const search = document.getElementById('search-input').value.toLowerCase();
    const pending = allReadings.filter(r => {
        if (r.status !== 'pending') return false;
        if (!search) return true;
        const unit = unitsMap[r.unitId] || {};
        if (searchMode === 'address') return r.locationAddress.toLowerCase().includes(search);
        if (searchMode === 'serial')  return unit.meterSerial && unit.meterSerial.toString().toLowerCase().includes(search);
        if (searchMode === 'name')    return (unit.ownerName || '').toLowerCase().includes(search);
        return true;
    });

    if (pending.length === 0) {
        container.innerHTML = `
            <div class="flex flex-col items-center justify-center py-20 text-center opacity-30">
                <i class="bi bi-check-circle text-5xl mb-4 text-emerald-500"></i>
                <p class="font-black uppercase tracking-tighter text-sm">No Arrears</p>
                <p class="text-[10px] font-bold mt-1 text-slate-400">All units are fully settled</p>
            </div>`;
        return;
    }

    const groups = {};
    pending.forEach(r => {
        if (!groups[r.propertyId]) groups[r.propertyId] = [];
        groups[r.propertyId].push(r);
    });

    const sorted = Object.entries(groups).sort((a, b) => {
        const sumA = a[1].reduce((s, r) => s + calculateAmount(r), 0);
        const sumB = b[1].reduce((s, r) => s + calculateAmount(r), 0);
        return sumB - sumA;
    });

    sorted.forEach(([propertyId, readings]) => {
        const total      = readings.reduce((s, r) => s + calculateAmount(r), 0);
        const cycleCount = readings.length;
        const sampleUnit = unitsMap[readings[0].unitId] || {};
        const owner      = sampleUnit.ownerName || 'Resident';
        const isOpen     = expandedArrears.has(propertyId);
        const sortedCycles = [...readings].sort((a, b) => a.billingCycle.localeCompare(b.billingCycle));
        const oldestCycle  = sortedCycles[0]?.billingCycle || '';
        const newestCycle  = sortedCycles[sortedCycles.length - 1]?.billingCycle || '';
        const cycleRange   = cycleCount === 1 ? oldestCycle : `${oldestCycle} – ${newestCycle}`;

        const group = document.createElement('div');
        group.className = 'arrears-group glass-card rounded-2xl overflow-hidden';
        group.innerHTML = `
            <div class="arrears-group-header flex items-center justify-between p-3 gap-3"
                 onclick="toggleArrearsGroup('${propertyId}')">
                <div class="flex items-center gap-3 min-w-0">
                    <div class="w-9 h-9 rounded-full flex-shrink-0 flex items-center justify-center bg-rose-500/10 text-rose-500">
                        <i class="bi bi-person-fill text-sm"></i>
                    </div>
                    <div class="min-w-0">
                        <div class="flex items-center gap-1.5 flex-wrap">
                            <p class="text-xs font-black uppercase tracking-tighter truncate">${owner}</p>
                            <span class="text-[7px] bg-rose-100 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 px-1.5 py-0.5 rounded font-black uppercase flex-shrink-0">${cycleCount} cycle${cycleCount !== 1 ? 's' : ''}</span>
                        </div>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider truncate">${readings[0].locationAddress} · ${cycleRange}</p>
                    </div>
                </div>
                <div class="flex items-center gap-2 flex-shrink-0">
                    <div class="text-right">
                        <p class="text-sm font-black text-rose-600">${formatCurrency(total)}</p>
                        <p class="text-[8px] font-black text-slate-400 uppercase">total owed</p>
                    </div>
                    <i class="bi bi-chevron-${isOpen ? 'up' : 'down'} text-slate-400 text-xs transition-transform" id="chevron-${propertyId}"></i>
                </div>
            </div>
            <div class="arrears-children ${isOpen ? 'is-open' : ''}" id="children-${propertyId}">
                <div class="border-t border-slate-100 dark:border-slate-800 mx-3 mb-2"></div>
                ${sortedCycles.map(r => {
                    const amt  = calculateAmount(r);
                    const unit = unitsMap[r.unitId] || {};
                    const gapBadge = r.isGapFill
                        ? `<span class="text-[7px] bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-400 px-1.5 py-0.5 rounded font-black uppercase">Gap Fill</span>`
                        : '';
                    return `
                        <div class="flex items-center justify-between px-3 py-2 gap-3 cursor-pointer hover:bg-water/5 rounded-xl mx-2 mb-1 transition-colors"
                             onclick="event.stopPropagation(); selectUnit(${JSON.stringify(r).replace(/"/g, '&quot;')})">
                            <div class="flex items-center gap-2 min-w-0">
                                <div class="w-6 h-6 rounded-full flex-shrink-0 flex items-center justify-center bg-amber-500/10 text-amber-500">
                                    <i class="bi bi-clock-history text-[10px]"></i>
                                </div>
                                <div class="min-w-0">
                                    <div class="flex items-center gap-1">
                                        <p class="text-[10px] font-black text-waterDark uppercase">${r.billingCycle}</p>
                                        ${gapBadge}
                                    </div>
                                    <p class="text-[8px] font-bold text-slate-400 truncate">${(r.reading - r.prevReading).toFixed(1)} m³ · SN: ${unit.meterSerial || 'N/A'}</p>
                                </div>
                            </div>
                            <p class="text-sm font-black text-slate-900 dark:text-white flex-shrink-0">${formatCurrency(amt)}</p>
                        </div>`;
                }).join('')}
                <div class="h-2"></div>
            </div>`;
        container.appendChild(group);
    });

    const totalArrears = pending.reduce((s, r) => s + calculateAmount(r), 0);
    const uniqueOwners = Object.keys(groups).length;
    const footer = document.createElement('div');
    footer.className = 'mt-2 p-4 rounded-2xl bg-rose-50 dark:bg-rose-900/10 border border-rose-200 dark:border-rose-800/30 flex justify-between items-center';
    footer.innerHTML = `
        <div>
            <p class="text-[8px] font-black text-rose-500 uppercase tracking-widest">Total Arrears</p>
            <p class="text-xs font-bold text-slate-500 mt-0.5">${uniqueOwners} properties · ${pending.length} outstanding cycles</p>
        </div>
        <p class="text-xl font-black text-rose-600">${formatCurrency(totalArrears)}</p>`;
    container.appendChild(footer);
};

window.toggleArrearsGroup = (propertyId) => {
    if (expandedArrears.has(propertyId)) expandedArrears.delete(propertyId);
    else expandedArrears.add(propertyId);
    renderArrears();
};

// ─── LEDGER RENDER ────────────────────────────────────────────────────────────

const renderLedger = () => {
    if (!dataLoaded) return;
    updateKPIs();
    if (viewMode === 'arrears') { renderArrears(); return; }

    const container = document.getElementById('ledger-container');
    const skeleton  = document.getElementById('ledger-skeleton');
    const search    = document.getElementById('search-input').value.toLowerCase();
    const cycle     = document.getElementById('filter-cycle').value;
    const year      = document.getElementById('filter-year').value || new Date().getFullYear().toString();
    if (skeleton) skeleton.remove();
    container.innerHTML = '';

    const filtered = allReadings.filter(r => {
        const unit = unitsMap[r.unitId] || {};
        if (kpiDateFilter) {
            const pad       = n => String(n).padStart(2, '0');
            const now       = new Date();
            const todayLocal  = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
            const monthLocal  = `${now.getFullYear()}-${pad(now.getMonth()+1)}`;
            const yearLocal   = now.getFullYear().toString();
            const toLocal     = (pd) => { const d = new Date(pd); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
            const toLocalMo   = (pd) => { const d = new Date(pd); return `${d.getFullYear()}-${pad(d.getMonth()+1)}`; };
            const toLocalYr   = (pd) => String(new Date(pd).getFullYear());
            if (r.status !== 'paid' || !r.paidDate) return false;
            if (kpiDateFilter === 'today') return toLocal(r.paidDate) === todayLocal;
            if (kpiDateFilter === 'mtd')   return toLocalMo(r.paidDate) === monthLocal;
            if (kpiDateFilter === 'ytd')   return toLocalYr(r.paidDate) === yearLocal;
            return false;
        } else {
            const matchesTime   = (timeMode === 'cycle') ? (r.billingCycle === cycle) : r.billingCycle.startsWith(year);
            const matchesStatus = currentFilterStatus === 'all' || r.status === currentFilterStatus;
            if (!matchesTime || !matchesStatus) return false;
        }
        if (!search) return true;
        if (searchMode === 'address') return r.locationAddress.toLowerCase().includes(search);
        if (searchMode === 'serial')  return unit.meterSerial && unit.meterSerial.toString().toLowerCase().includes(search);
        if (searchMode === 'name')    return (unit.ownerName || '').toLowerCase().includes(search);
        return false;
    });

    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="flex flex-col items-center justify-center py-20 text-center opacity-30">
                <i class="bi bi-inbox text-5xl mb-4"></i>
                <p class="font-black uppercase tracking-tighter text-sm">No records found</p>
                <p class="text-[10px] font-bold mt-1 text-slate-400">
                    ${search ? 'Try a different search term' : 'No readings match the current filter'}
                </p>
            </div>`;
        return;
    }

    filtered.forEach(r => {
        const amount        = calculateAmount(r);
        const isPaid        = r.status === 'paid';
        const unit          = unitsMap[r.unitId] || {};
        const owner         = unit.ownerName || 'Resident';
        const paidDateShort = r.paidDate
            ? new Date(r.paidDate).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })
            : null;
        const gapBadge = r.isGapFill
            ? `<span class="text-[7px] bg-amber-400 text-white px-1.5 py-0.5 rounded font-black uppercase ml-1">⚠ Gap Fill</span>`
            : '';
        const pendingBg = isPaid ? '' : r.isGapFill
            ? 'bg-amber-100/80 dark:bg-amber-900/20 border-amber-300/60 dark:border-amber-700/40'
            : 'bg-amber-50/80 dark:bg-amber-900/10 border-amber-200/60 dark:border-amber-800/30';
        const card = document.createElement('div');
        card.className = `glass-card p-3 rounded-2xl flex items-center justify-between cursor-pointer hover:scale-[1.01] active:scale-95 transition-all ${pendingBg} ${activeReading?.readingId === r.readingId ? 'ring-2 ring-water' : ''}`;
        card.onclick = () => selectUnit(r);
        card.innerHTML = `
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center ${isPaid ? 'bg-emerald-500/10 text-emerald-500' : 'bg-amber-500/15 text-amber-500'}">
                    <i class="bi ${isPaid ? 'bi-check-circle-fill' : 'bi-clock-history'} text-sm"></i>
                </div>
                <div class="min-w-0">
                    <div class="flex items-center gap-1 flex-wrap">
                        <p class="text-xs font-black uppercase tracking-tighter truncate">${r.locationAddress}</p>
                        <span class="text-[7px] bg-water/10 text-waterDark px-1.5 py-0.5 rounded font-black uppercase flex-shrink-0">${unit.unitLabel || 'Unit'}</span>
                        ${gapBadge}
                    </div>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider truncate">${owner} · SN: ${unit.meterSerial || 'N/A'}</p>
                </div>
            </div>
            <div class="text-right flex-shrink-0 ml-2">
                <p class="text-sm font-black ${isPaid ? 'text-emerald-600 dark:text-emerald-400' : 'text-amber-600 dark:text-amber-400'}">${formatCurrency(amount)}</p>
                ${isPaid
                    ? `<p class="text-[8px] font-black text-emerald-500 dark:text-emerald-400 uppercase opacity-70">${paidDateShort || 'Paid'}</p>`
                    : `<p class="text-[8px] font-black text-amber-500 dark:text-amber-400 uppercase tracking-wide">Pending</p>`
                }
            </div>`;
        container.appendChild(card);
    });
};

window.processPayment = async () => {
    if (!activeReading) return;
    const isSettling = activeReading.status !== 'paid';
    try {
        await db.ref(`readings/${activeReading.readingId}`).update({
            status:   isSettling ? 'paid' : 'pending',
            paidDate: isSettling ? new Date().toISOString() : null,
            paidBy:   isSettling ? currentBillingStaff.name : null,
            paidByUid: isSettling ? currentBillingStaff.uid : null
        });
        toast(isSettling ? 'Payment recorded' : 'Status reset', 'success');
    } catch (e) {
        console.error('processPayment error:', e);
        const msg = e?.code || e?.message || 'Unknown error';
        toast(`Error: ${msg}`, 'error');
    }
};

window.toggleCycleDropdown = () => {
    const panel   = document.getElementById('cycle-options');

    if (isOpen) {
        panel.classList.add('scale-95', 'opacity-0');

        trigger.classList.remove('is-open');
    } else {
        panel.classList.remove('hidden');
        setTimeout(() => panel.classList.remove('scale-95', 'opacity-0'), 10);
        trigger.classList.add('is-open');

window.handleExcelExport = () => {
    const cycle = document.getElementById('filter-cycle').value;
    const year  = document.getElementById('filter-year').value || new Date().getFullYear().toString();
    const data  = allReadings
        .filter(r => (timeMode === 'cycle') ? r.billingCycle === cycle : r.billingCycle.startsWith(year))
        .map(r => ({
            Address:  r.locationAddress,
            Owner:    (unitsMap[r.unitId] || {}).ownerName || 'Resident',
            Unit:     (unitsMap[r.unitId] || {}).unitLabel || 'Standard',
            Cycle:    r.billingCycle,
            Usage:    (r.reading - r.prevReading).toFixed(1),
            Amount:   calculateAmount(r),
            Status:   r.status,
            GapFill:  r.isGapFill ? 'Yes' : 'No',
            PaidDate: r.paidDate
                ? new Date(r.paidDate).toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
                : 'N/A'
        }));
    const label = timeMode === 'cycle' ? cycle : year;
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Collection');
    XLSX.writeFile(wb, `AquaTrack_${label}.xlsx`);
};

            .sort((a, b) => a.billingCycle.localeCompare(b.billingCycle));
        if (pendingForProperty.length > 0 && pendingForProperty[0].readingId !== activeReading.readingId) {

    document.getElementById('conf-owner').innerText   = unit.ownerName || 'Resident';
    document.getElementById('conf-label').innerText   = unit.unitLabel || 'Unit';
    document.getElementById('conf-usage').innerText   = `${(activeReading.reading - activeReading.prevReading).toFixed(1)} m³`;
    document.getElementById('conf-amount').innerText  = formatCurrency(amount);
    document.getElementById('conf-cycle').innerText   = `Cycle: ${activeReading.billingCycle}`;
    modal.classList.remove('hidden');
    if (isUndo) {
        document.getElementById('conf-cycle').className = 'text-[9px] font-black text-rose-500 mt-1 uppercase tracking-widest';
        iconBox.className    = 'w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-4 bg-amber-500/10 text-amber-500';
        icon.className       = 'bi bi-arrow-counterclockwise text-3xl';
        title.innerText      = 'Revert Payment';
        prompt.innerText     = 'Please wait before undoing this payment status';
        confirmBtn.innerText = 'Confirm Undo';
        confirmBtn.className = 'w-full py-4 bg-amber-500 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg shadow-amber-500/20';
        actions.classList.add('hidden');
        lockout.classList.remove('hidden');
        lockout.classList.add('flex');
        startLockoutCountdown();
    } else {
        document.getElementById('conf-cycle').className = 'text-[9px] font-black text-waterDark mt-1 uppercase tracking-widest';
        iconBox.className    = 'w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-4 bg-emerald-500/10 text-emerald-500';
        icon.className       = 'bi bi-cash-stack text-3xl';
        title.innerText      = 'Settle Statement';
        prompt.innerText     = 'Confirm you are marking this statement as paid';
        confirmBtn.innerText = 'Confirm Payment';
        confirmBtn.className = 'w-full py-4 bg-emerald-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg shadow-emerald-600/20';
        actions.classList.remove('hidden');
        lockout.classList.add('hidden');
        lockout.classList.remove('flex');
    }
    confirmBtn.onclick = () => { processPayment(); closeConfirmModal(); };
};

const startLockoutCountdown = () => {
    let timeLeft        = 50;
    const circle        = document.getElementById('countdown-circle');
    const text          = document.getElementById('countdown-text');
    const circumference = 2 * Math.PI * 20;
    if (lockoutTimer) clearInterval(lockoutTimer);
    lockoutTimer = setInterval(() => {
        timeLeft--;
        text.innerText = Math.ceil(timeLeft / 10);
        circle.style.strokeDashoffset = circumference - (timeLeft / 50) * circumference;
        if (timeLeft <= 0) {
            clearInterval(lockoutTimer);
            const lockout = document.getElementById('lockout-container');
            lockout.classList.add('hidden');
            lockout.classList.remove('flex');
            document.getElementById('modal-actions').classList.remove('hidden');
        }
    }, 100);
};

window.closeConfirmModal = () => {
    document.getElementById('confirmModal').classList.add('hidden');
    if (lockoutTimer) clearInterval(lockoutTimer);
};

// ─── AUTH & DATA LOAD ─────────────────────────────────────────────────────────

// FIX: async (user) => so that await works inside the callback
auth.onAuthStateChanged(async (user) => {
    if (!user) return window.location.replace('../index.html');

    // ── ROLE GUARD ────────────────────────────────────────────────────────────
    try {
        const userSnap = await db.ref(`users/${user.uid}`).once('value');
        const userData  = userSnap.val();
        if (!userData || userData.role !== 'billing') {
            await auth.signOut();
            sessionStorage.clear();
            return window.location.replace('../index.html');
        }

        // Set staff name in welcome bar — userData is in scope here
        const staffName = userData.name || user.displayName || 'Staff';
        currentBillingStaff = { uid: user.uid, name: staffName };
        const nameEl = document.getElementById('billing-staff-name');
        if (nameEl) nameEl.innerText = staffName;

    } catch (e) {
        console.error('Role verification failed:', e);
        return window.location.replace('../index.html');
    }
    // ── END ROLE GUARD ────────────────────────────────────────────────────────

    db.ref('config/org').on('value', snap => {
        if (snap.exists()) {
            const val = snap.val();
            orgConfig = { name: val.name || 'AquaTrack', subname: val.subname || '' };
        }
    });

    db.ref('properties').on('value', pSnap => {
        const props = pSnap.val() || {};
        db.ref('Unit').on('value', uSnap => {
            if (!uSnap.exists()) return;
            const units = uSnap.val();
            unitsMap = {};
            for (let id in units) {
                const parent = props[units[id].propertyId] || {};
                unitsMap[id] = { ...units[id], ownerName: parent.ownerName || 'Resident' };
            }
            renderLedger();
        });
    });

    db.ref('readings').on('value', snap => {
        if (!snap.exists()) return;
        allReadings = Object.values(snap.val());
        dataLoaded  = true;

        const cycles           = [...new Set(allReadings.map(r => r.billingCycle))].sort().reverse();
        const optionsContainer = document.getElementById('cycle-options');
        const hiddenInput      = document.getElementById('filter-cycle');
        const label            = document.getElementById('selected-cycle-label');

        if (!hiddenInput.value && cycles.length > 0) {
            hiddenInput.value = cycles[0];
            label.innerText   = cycles[0];
        }

        optionsContainer.innerHTML = cycles.map(c => `
            <div class="select-option ${hiddenInput.value === c ? 'is-selected' : ''}"
                onclick="selectCycleOption('${c}')">${c}</div>
        `).join('');

        renderLedger();

        if (activeReading) {
            const updated = allReadings.find(r => r.readingId === activeReading.readingId);
            if (updated) selectUnit(updated);
        }
    });
});

document.getElementById('search-input').oninput = renderLedger;
document.getElementById('filter-year').oninput  = renderLedger;

</script>
