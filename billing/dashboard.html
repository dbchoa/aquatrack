<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Central - AquaTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(79, 172, 254, 0.2); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#020617] text-slate-900 dark:text-slate-100 transition-colors">
    <header id="header-container"></header>

    <main class="max-w-6xl mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-panel p-6 rounded-32 shadow-xl border-b-4 border-waterDark">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Total Receivables</p>
                <h2 id="hud-total-receivable" class="text-3xl font-black tracking-tighter text-slate-900 dark:text-white">₱ 0.00</h2>
            </div>
            <div class="glass-panel p-6 rounded-32 shadow-xl border-b-4 border-emerald-500">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Collected (Current Cycle)</p>
                <h2 id="hud-total-collected" class="text-3xl font-black tracking-tighter text-emerald-600">₱ 0.00</h2>
            </div>
            <div class="glass-panel p-6 rounded-32 shadow-xl border-b-4 border-amber-500">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Unpaid Accounts</p>
                <h2 id="hud-unpaid-count" class="text-3xl font-black tracking-tighter text-amber-600">0</h2>
            </div>
        </div>

        <div class="glass-panel p-6 rounded-2xl mb-6 flex flex-wrap gap-4 items-end">
            <div class="flex-1 min-w-[200px]">
                <label class="text-[9px] font-black text-slate-400 uppercase mb-1 block">Search Account/Serial</label>
                <input id="search-input" type="text" placeholder="Type here..." class="w-full p-3 bg-slate-100 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 ring-water/40">
            </div>
            <div>
                <label class="text-[9px] font-black text-slate-400 uppercase mb-1 block">Cycle</label>
                <select id="filter-cycle" class="p-3 bg-slate-100 dark:bg-slate-800 rounded-xl outline-none"></select>
            </div>
            <div>
                <label class="text-[9px] font-black text-slate-400 uppercase mb-1 block">Status</label>
                <select id="filter-status" class="p-3 bg-slate-100 dark:bg-slate-800 rounded-xl outline-none">
                    <option value="all">All</option>
                    <option value="pending" selected>Unpaid (Pending)</option>
                    <option value="paid">Paid</option>
                </select>
            </div>
            <button onclick="exportToExcel()" class="bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-widest flex items-center gap-2">
                <i class="bi bi-file-earmark-spreadsheet"></i> Export
            </button>
        </div>

        <div class="glass-panel rounded-32 overflow-hidden shadow-2xl">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-100 dark:bg-slate-800/50 text-[10px] uppercase font-black tracking-widest text-slate-500">
                    <tr>
                        <th class="p-5">Account / Serial</th>
                        <th class="p-5">Cycle</th>
                        <th class="p-5">Usage</th>
                        <th class="p-5">Amount</th>
                        <th class="p-5">Status</th>
                        <th class="p-5">Action</th>
                    </tr>
                </thead>
                <tbody id="report-body" class="divide-y divide-slate-200 dark:divide-slate-800">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="paymentModal" class="hidden fixed inset-0 z-[500] bg-black/60 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-center uppercase tracking-tight">Record Payment</h3>
            <div class="mb-8 text-center">
                <p id="pay-account-name" class="font-black text-waterDark text-lg">---</p>
                <p id="pay-amount" class="text-2xl font-black text-emerald-600 mt-2">₱ 0.00</p>
            </div>
            <div class="mb-8">
                <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Date Paid</label>
                <input id="pay-date" type="date" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl outline-none">
            </div>
            <div class="flex gap-3">
                <button onclick="closePaymentModal()" class="flex-1 py-4 text-slate-500 font-bold uppercase text-xs">Cancel</button>
                <button onclick="confirmPayment()" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-bold uppercase text-xs">Mark Paid</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>
    <script type="module">
        import { injectHeader } from '../js/header-component.js';
        import { db, auth } from '../js/firebase-init.js';
        import { toast, formatCurrency } from '../js/utils.js';

        injectHeader();

        let currentReadings = [];
        let activeRecord = null;

        // Initialize Filter logic, Listeners for table, HUD calculations, etc.
    </script>
</body>
</html>
