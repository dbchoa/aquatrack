<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Central - AquaTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="../style.css">
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(79, 172, 254, 0.2); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#020617] text-slate-900 dark:text-slate-100 transition-colors">
    <header id="header-container"></header>
<div id="toast-container"></div>

<main class="max-w-4xl mx-auto p-6 pt-6 pb-44">
    <div class="mb-10 text-center">
        <p class="text-[10px] text-emerald-500 font-bold uppercase tracking-[0.4em] mb-2 opacity-80">● Accounting Live</p>
        <h2 class="text-3xl font-black tracking-tighter text-slate-900 dark:text-white uppercase">Billing Dashboard</h2>
        <div class="flex flex-col items-center gap-3 mt-1">
            <p class="text-[11px] font-bold text-waterDark dark:text-water uppercase tracking-widest">
                Hello, <span id="staff-name-display">...</span>
            </p>
            <button onclick="openPasswordModal()" class="w-7 h-7 rounded-xl bg-water/10 flex items-center justify-center text-waterDark active:scale-90 transition-transform">
                <i class="bi bi-gear-fill text-lg"></i>
            </button>
        </div>
    </div>

    <div class="glass-card p-8 rounded-32 border-b-4 dark:border-b-4 border-emerald-500 mb-8 bg-white/90 dark:bg-slate-900/50 shadow-2xl relative overflow-hidden">
        <div class="flex justify-between items-end relative z-10">
            <div>
                <p class="text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-[0.3em] mb-1">Collection Efficiency</p>
                <h3 id="display-efficiency-pct" class="text-5xl font-black tracking-tighter text-slate-900 dark:text-white stat-glow">--<span class="text-lg opacity-50 ml-1">%</span></h3>
            </div>
            <div class="text-right">
                <span id="display-collected-amount" class="text-[10px] font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-widest">₱ 0.00 Collected</span>
            </div>
        </div>
        <div class="w-full h-2 bg-slate-200 dark:bg-slate-800 rounded-full mt-8 overflow-hidden">
            <div id="efficiency-bar" class="h-full bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.4)] transition-all duration-1000 ease-out" style="width: 0%"></div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="glass-card p-6 rounded-xl shadow-sm border-water/40 dark:border-water/40">
            <p class="text-[9px] font-black text-slate-500 dark:text-slate-200 uppercase tracking-widest mb-1">Total Receivables</p>
            <h4 id="hud-receivables" class="text-sm font-bold text-waterDark dark:text-water">₱ 0,000.00</h4>
        </div>
        <div class="glass-card p-6 rounded-xl shadow-sm border-water/40 dark:border-water/40">
            <p class="text-[9px] font-black text-slate-500 dark:text-slate-200 uppercase tracking-widest mb-1">Unpaid Units</p>
            <h4 id="hud-unpaid-units" class="text-sm font-bold text-amber-500">-- Units</h4>
        </div>
    </div>

    </main>

    <div id="paymentModal" class="hidden fixed inset-0 z-[500] bg-black/60 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-center uppercase tracking-tight">Record Payment</h3>
            <div class="mb-8 text-center">
                <p id="pay-account-name" class="font-black text-waterDark text-lg">---</p>
                <p id="pay-amount" class="text-2xl font-black text-emerald-600 mt-2">₱ 0.00</p>
            </div>
            <div class="mb-8">
                <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Date Paid</label>
                <input id="pay-date" type="date" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl outline-none">
            </div>
            <div class="flex gap-3">
                <button onclick="closePaymentModal()" class="flex-1 py-4 text-slate-500 font-bold uppercase text-xs">Cancel</button>
                <button onclick="confirmPayment()" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-bold uppercase text-xs">Mark Paid</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>
    <script type="module">
        import { injectHeader } from '../js/header-component.js';
        import { db, auth } from '../js/firebase-init.js';
        import { toast, formatCurrency } from '../js/utils.js';

        injectHeader();

        let currentReadings = [];
        let activeRecord = null;

        // Initialize Filter logic, Listeners for table, HUD calculations, etc.
    </script>
</body>
</html>
