<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AquaTrack</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="toast-container"></div>
    <header></header>

    <div class="glass-orb orb-1"></div>
    <div class="glass-orb orb-2"></div>

    <div class="container">
        <div class="welcome-card">
            <span style="text-transform: uppercase; font-size: 0.75rem; font-weight: 800; color: var(--accent); letter-spacing: 0.25em; display: block; margin-bottom: 8px;">Field Operations Hub</span>
            <h2 id="welcome-msg" style="font-size: 2.75rem; font-weight: 900; letter-spacing: -0.06em; line-height: 0.9;">Mabuhay!</h2>
            <p class="text-muted" style="margin-top: 12px; font-weight: 600; font-size: 1rem;">
                You have <strong style="color: var(--text-main); font-weight: 900;">12 readings</strong> left for today.
            </p>
        </div>

        <div class="dash-row">
            <div class="dash-item">
                <span class="dash-label">Pending</span>
                <div class="dash-value" id="count-pending">12</div>
            </div>
            <div class="dash-item">
                <span class="dash-label">Synced</span>
                <div class="dash-value" id="count-done" style="background: linear-gradient(135deg, #10b981, #059669); -webkit-background-clip: text;">48</div>
            </div>
        </div>

        <div class="card">
            <div style="position: absolute; top: -30px; right: -30px; width: 160px; height: 160px; background: var(--accent-glow); filter: blur(50px); border-radius: 50%; pointer-events: none;"></div>
            
            <h3 style="font-size: 1.6rem; font-weight: 900; letter-spacing: -0.03em;">Capture Reading</h3>
            <p class="text-muted" style="margin-top: 12px; margin-bottom: 2.5rem; line-height: 1.6; font-weight: 500;">
                Begin capturing consumption data. All readings are automatically cryptographically synced to the subdivision cloud.
            </p>
            
            <button class="btn btn-primary" onclick="window.location.href='read-meter.html'">
                <span>Begin Scanning</span>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script type="module">
        import { requireRole } from '../js/utils.js';
        import { injectHeader } from '../js/header-component.js';

        injectHeader('Reader');
        requireRole('reader');

        const name = sessionStorage.getItem('aqt_user_name') || 'Personnel';
        document.getElementById('welcome-msg').textContent = `Mabuhay, ${name.split(' ')[0]}!`;
    </script>
</body>
</html>
