<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AquaTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { water: '#4facfe' },
                    borderRadius: { '32': '32px', '48': '48px' }
                }
            }
        }
    </script>
    <style>
        .stat-glow { text-shadow: 0 0 15px rgba(79, 172, 254, 0.4); }
        .dash-row {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(15, 23, 42, 0.05);
        }
        .dark .dash-row {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .dash-row:hover {
            transform: translateY(-2px);
            background: white;
            box-shadow: 0 10px 25px -5px rgba(79, 172, 254, 0.15);
        }
        .dark .dash-row:hover {
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(79, 172, 254, 0.3);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#020617] font-sans text-slate-900 dark:text-slate-100 transition-colors duration-300">
    
    <header></header>

    <main class="max-w-xl mx-auto p-6 pt-12 pb-32">
        
        <div class="mb-10 text-center">
            <h2 class="text-3xl font-black tracking-tighter text-slate-800 dark:text-white uppercase">Reader Dashboard</h2>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.4em] mt-2 opacity-60">Subdivision Telemetry Access</p>
        </div>
        
        <div class="glass-card p-8 rounded-48 border-b-4 border-water mb-8 bg-white/50 dark:bg-slate-900/50 shadow-2xl relative overflow-hidden">
            <div class="flex justify-between items-end relative z-10">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-1">Cycle Completion</p>
                    <h3 id="display-progress-pct" class="text-5xl font-black tracking-tighter dark:text-white stat-glow">0<span class="text-lg opacity-50 text-water ml-1">%</span></h3>
                </div>
                <div class="text-right">
                    <span id="display-counts" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Syncing Progress...</span>
                </div>
            </div>
            <div class="w-full h-2 bg-slate-200 dark:bg-slate-800 rounded-full mt-8 overflow-hidden">
                <div id="progress-bar" class="h-full bg-water shadow-[0_0_15px_#4facfe] transition-all duration-1000 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="glass-card p-6 rounded-32 bg-white/40 dark:bg-slate-900/40 border border-white dark:border-slate-800">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Current Sector</p>
                <h4 id="active-street" class="text-xl font-bold dark:text-white truncate">---</h4>
            </div>
            <div class="glass-card p-6 rounded-32 bg-white/40 dark:bg-slate-900/40 border border-white dark:border-slate-800">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Remaining</p>
                <h4 id="remaining-units" class="text-xl font-bold text-water">--</h4>
            </div>
        </div>

        <div class="flex items-center justify-between mb-8 px-2">
            <h2 class="text-[11px] font-black uppercase tracking-[0.25em] text-slate-400">Activity Log</h2>
            <div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-800 ml-6 opacity-40"></div>
        </div>

        <div id="readings-feed" class="space-y-4">
            <div class="text-center py-20 text-slate-400 animate-pulse uppercase text-[10px] tracking-widest font-bold">
                Awaiting Telemetry...
            </div>
        </div>
    </main>

    <div class="fixed bottom-10 left-0 w-full flex justify-center z-50">
        <button onclick="window.location.href='read-meter.html'" 
            class="px-12 py-5 rounded-full bg-water text-white text-xs font-bold uppercase tracking-[0.25em] shadow-2xl shadow-water/40 hover:scale-105 active:scale-95 transition-all">
            Initialize Reading
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script type="module">
        import { injectHeader } from '../js/header-component.js';
        import { db, auth } from '../js/firebase-init.js';
        import '../js/utils.js'; 

        injectHeader(); 

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = '../index.html';
                return;
            }
            loadTelemetry(user.uid);
        });

        async function loadTelemetry(uid) {
            // [Inference] Fetching street progress and summary data
            // For now, setting mock visual states to show the design intent
            // Later we will link these to actual Firebase aggregation logic
            updateProgressHUD(168, 200);
            document.getElementById('active-street').innerText = "Acacia St.";
            document.getElementById('remaining-units').innerText = "32 Units";

            // Live feed logic (identical to previous setup)
            db.ref('readings').orderByChild('reader_uid').equalTo(uid).limitToLast(10).on('value', snap => {
                renderFeed(snap.val());
            });
        }

        function updateProgressHUD(current, total) {
            const pct = Math.round((current / total) * 100);
            document.getElementById('display-progress-pct').innerHTML = `${pct}<span class="text-lg opacity-50 text-water ml-1">%</span>`;
            document.getElementById('display-counts').innerText = `${current} / ${total} Units`;
            document.getElementById('progress-bar').style.width = `${pct}%`;
        }

        function renderFeed(logs) {
            const container = document.getElementById('readings-feed');
            if (!logs) {
                container.innerHTML = `<div class="text-center py-16 text-slate-400 italic text-xs uppercase tracking-widest opacity-60">Terminal empty.</div>`;
                return;
            }

            container.innerHTML = Object.entries(logs).reverse().map(([id, data]) => `
                <div class="dash-row p-6 rounded-32 flex items-center justify-between border border-transparent">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-water uppercase tracking-[0.15em] mb-1">${data.account_id}</span>
                        <span class="text-[11px] font-medium text-slate-400">${data.read_date}</span>
                    </div>
                    <div class="text-right">
                        <span class="text-xl font-black tracking-tighter dark:text-white text-slate-800">${data.current_reading}</span>
                        <span class="text-[10px] font-bold text-slate-400 ml-1 uppercase">m³</span>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
