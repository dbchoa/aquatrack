<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AquaTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { water: '#4facfe' },
                    borderRadius: { '32': '32px', '48': '48px' }
                }
            }
        }
    </script>
    <style>
        .stat-glow { text-shadow: 0 0 15px rgba(79, 172, 254, 0.4); }
        .dash-row {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(15, 23, 42, 0.05);
        }
        .dark .dash-row {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .dash-row:hover {
            transform: translateY(-2px);
            background: white;
            box-shadow: 0 10px 25px -5px rgba(79, 172, 254, 0.15);
        }
        .dark .dash-row:hover {
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(79, 172, 254, 0.3);
        }

        /* 1. THE GLASS VESSEL - PERMANENT VOID BACKGROUND */
        .glass-vessel {
            position: relative;
            width: 72px;
            height: 72px;
            /* SOVEREIGN FIX: Forced deep background for icon contrast */
            background: #011030; 
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4);
            transform: translate3d(0, 0, 0);
        }

        /* 2. THE TRIPLE GRADIENT WATER */
        .water-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 85%;
            background: linear-gradient(to bottom, 
                #4facfe 0%,   
                #0072ff 50%,  
                #003366 100%  
            );
        }

        /* 3. THE SLOSHING WAVE - SYNCED TO VOID BACKGROUND */
        .water-fill::before {
            content: "";
            position: absolute;
            top: -165%;
            left: -50%;
            width: 200%;
            height: 200%;
            /* SYNCED: Uses the same void color to create the slosh crest */
            background: #011030; 
            border-radius: 38%;
            animation: slosh 5s linear infinite;
        }

        /* 4. GLASS REFLECTION LAYER */
        .glass-vessel::after {
            content: "";
            position: absolute;
            top: 5px;
            left: 12px;
            width: 25px;
            height: 12px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: rotate(-15deg);
            z-index: 25;
            pointer-events: none;
        }

        @keyframes slosh {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#020617] font-sans text-slate-900 dark:text-slate-100 transition-colors duration-300">
    
    <header></header>

    <main class="max-w-xl mx-auto p-6 pt-12 pb-44">
        
        <div class="mb-10 text-center">
            <h2 class="text-3xl font-black tracking-tighter text-slate-800 dark:text-white uppercase">Reader Dashboard</h2>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.4em] mt-2 opacity-60">Field Telemetry Terminal</p>
        </div>
        
        <div class="glass-card p-8 rounded-48 border-b-4 border-water mb-8 bg-white/50 dark:bg-slate-900/50 shadow-2xl relative overflow-hidden">
            <div class="flex justify-between items-end relative z-10">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-1">Cycle Completion</p>
                    <h3 id="display-progress-pct" class="text-5xl font-black tracking-tighter dark:text-white stat-glow">84<span class="text-lg opacity-50 text-water ml-1">%</span></h3>
                </div>
                <div class="text-right">
                    <span id="display-counts" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-water">168 / 200 Units</span>
                </div>
            </div>
            <div class="w-full h-2 bg-slate-200 dark:bg-slate-800 rounded-full mt-8 overflow-hidden">
                <div id="progress-bar" class="h-full bg-water shadow-[0_0_15px_#4facfe] transition-all duration-1000 ease-out" style="width: 84%"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="glass-card p-6 rounded-32 bg-white/40 dark:bg-slate-900/40 border border-white dark:border-slate-800">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Current Sector</p>
                <h4 id="active-street" class="text-xl font-bold dark:text-white truncate">Acacia St.</h4>
            </div>
            <div class="glass-card p-6 rounded-32 bg-white/40 dark:bg-slate-900/40 border border-white dark:border-slate-800">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Remaining</p>
                <h4 id="remaining-units" class="text-xl font-bold text-water">32 Units</h4>
            </div>
        </div>

        <div class="flex items-center justify-between mb-8 px-2">
            <div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-800 mr-6 opacity-40"></div>
            <h2 class="text-[11px] font-black uppercase tracking-[0.25em] text-slate-400">Activity Log</h2>
            <div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-800 ml-6 opacity-40"></div>
        </div>

        <div id="readings-feed" class="space-y-4">
            <div class="dash-row p-6 rounded-32 flex items-center justify-between border border-transparent">
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-water uppercase tracking-[0.15em] mb-1">ACC-045</span>
                    <span class="text-[11px] font-medium text-slate-400">Apr 28, 2026</span>
                </div>
                <div class="text-right">
                    <span class="text-xl font-black tracking-tighter dark:text-white text-slate-800">124.5</span>
                    <span class="text-[10px] font-bold text-slate-400 ml-1 uppercase">m³</span>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 z-[110] bg-white/80 dark:bg-[#020617]/80 backdrop-blur-xl border-t border-slate-200 dark:border-white/5 px-6 py-5">
        <div class="max-w-xl mx-auto flex justify-center items-center">
            
            <button onclick="window.location.href='read-meter.html'" class="relative flex items-center justify-center group active:scale-90 transition-all duration-300">
                
                <span class="absolute inset-0 rounded-full bg-water animate-ping opacity-20 pointer-events-none"></span>

                <div class="glass-vessel">
                    <div class="water-fill"></div>
                    <div class="absolute inset-0 flex items-center justify-center z-20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white drop-shadow-[0_2px_10px_rgba(0,0,0,0.4)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                        </svg>
                    </div>
                </div>

            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script type="module">
        import { injectHeader } from '../js/header-component.js';
        import { db, auth } from '../js/firebase-init.js';
        import '../js/utils.js'; 

        injectHeader(); 

        auth.onAuthStateChanged((user) => {
            if (!user) window.location.href = '../index.html';
        });
    </script>
</body>
</html>
