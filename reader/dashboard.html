<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AquaTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        water: '#4facfe', 
                        waterDark: '#0072ff',
                        electric: '#4facfe' // Added for easy utility use
                    },
                    borderRadius: { '32': '32px', '48': '48px' }
                }
            }
        }
    </script>
    <style>
        .stat-glow { text-shadow: 0 0 15px rgba(79, 172, 254, 0.4); }
        .glass-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.9);
            backdrop-blur: 12px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        /* RESTORED & ENHANCED: Electric Blue HUD */
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(79, 172, 254, 0.4);
            box-shadow: inset 0 0 12px rgba(79, 172, 254, 0.05);
        }

        .console-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-left: 2px solid #4facfe;
            margin-bottom: 0.25rem;
            transition: opacity 0.3s ease;
        }

        .glass-vessel {
            position: relative; width: 72px; height: 72px;
            background: #011030; border: 2px solid rgba(79, 172, 254, 0.5);
            border-radius: 50%; overflow: hidden;
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4);
            transform: translate3d(0, 0, 0);
        }

        .water-fill {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 85%;
            background: linear-gradient(to bottom, #4facfe 0%, #0072ff 50%, #003366 100%);
        }

        .water-fill::before {
            content: ""; position: absolute; top: -165%; left: -50%; width: 200%; height: 200%;
            background: #011030; border-radius: 38%; animation: slosh 5s linear infinite;
        }

        .glass-vessel::after {
            content: ""; position: absolute; top: 5px; left: 12px; width: 25px; height: 12px;
            background: rgba(255, 255, 255, 0.3); border-radius: 50%;
            transform: rotate(-15deg); z-index: 25; pointer-events: none;
        }

        @keyframes slosh { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }

        #toast-container {
            position: fixed; bottom: 110px; left: 50%;
            transform: translateX(-50%); z-index: 999; pointer-events: none;
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-[#020617] font-sans text-slate-900 dark:text-slate-100 transition-colors duration-300">
    
    <header></header>
    <div id="toast-container"></div>

    <main class="max-w-xl mx-auto p-6 pt-12 pb-44">
        
        <div class="mb-10 text-center">
            <h2 class="text-3xl font-black tracking-tighter text-slate-900 dark:text-white uppercase">Reader Dashboard</h2>
            <p class="text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-[0.4em] mt-2 opacity-60">Field Telemetry Terminal</p>
        </div>
        
        <div class="glass-card p-8 rounded-32 border-b-4 border-water mb-8 bg-white/90 dark:bg-slate-900/50 shadow-2xl relative overflow-hidden">
            <div class="flex justify-between items-end relative z-10">
                <div>
                    <p class="text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-[0.3em] mb-1">Cycle Completion</p>
                    <h3 id="display-progress-pct" class="text-5xl font-black tracking-tighter text-slate-900 dark:text-white stat-glow">--<span class="text-lg opacity-50 text-waterDark dark:text-water ml-1">%</span></h3>
                </div>
                <div class="text-right">
                    <span id="display-counts" class="text-[10px] font-bold text-waterDark dark:text-water uppercase tracking-widest">Initialising HUD...</span>
                </div>
            </div>
            <div class="w-full h-2 bg-slate-200 dark:bg-slate-800 rounded-full mt-8 overflow-hidden">
                <div id="progress-bar" class="h-full bg-waterDark dark:bg-water shadow-[0_0_15px_#4facfe] transition-all duration-1000 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="glass-card p-6 rounded-32 shadow-sm border-water/40 dark:border-water/40">
                <p class="text-[9px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1">Current Sector</p>
                <h4 id="active-street" class="text-xl font-bold text-slate-900 dark:text-white truncate">Acacia St.</h4>
            </div>
            <div class="glass-card p-6 rounded-32 shadow-sm border-water/40 dark:border-water/40">
                <p class="text-[9px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1">Remaining</p>
                <h4 id="remaining-units" class="text-xl font-bold text-waterDark dark:text-water">-- Units</h4>
            </div>
        </div>

        <div class="glass-card p-5 rounded-32 mb-10 flex items-center justify-between border-dashed border-water/30 bg-water/5">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-2xl bg-water/10 flex items-center justify-center text-waterDark">
                    <i class="bi bi-info-circle-fill text-lg"></i>
                </div>
                <div>
                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Prevailing Rate</p>
                    <h4 id="rate-summary-text" class="text-xs font-bold text-slate-700 dark:text-slate-300">Syncing rates...</h4>
                </div>
            </div>
            <div class="text-right">
                <p id="rate-min-fee" class="text-sm font-black text-waterDark dark:text-water">₱ --</p>
                <p class="text-[8px] font-bold uppercase opacity-50">Base Fee</p>
            </div>
        </div>

        <div class="flex items-center justify-between mb-4 px-2">
            <div class="h-[1px] flex-1 bg-slate-300 dark:bg-slate-800 mr-6 opacity-40"></div>
            <h2 class="text-[11px] font-black uppercase tracking-[0.25em] text-slate-500 dark:text-slate-400">Activity Log</h2>
            <div class="h-[1px] flex-1 bg-slate-300 dark:bg-slate-800 ml-6 opacity-40"></div>
        </div>

        <div id="readings-feed" class="flex flex-col space-y-1"></div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 z-[110] bg-white/90 dark:bg-[#020617]/90 backdrop-blur-xl border-t border-slate-200 dark:border-white/5 px-6 py-5">
        <div class="max-w-xl mx-auto flex justify-center items-center">
            <button onclick="openReadingModal()" class="relative flex items-center justify-center group active:scale-95 transition-all duration-300">
                <span class="absolute inset-0 rounded-full bg-waterDark animate-ping opacity-20 pointer-events-none"></span>
                <div class="glass-vessel">
                    <div class="water-fill"></div>
                    <div class="absolute inset-0 flex items-center justify-center z-20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white drop-shadow-lg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                        </svg>
                    </div>
                </div>
            </button>
        </div>
    </div>

    <div id="readingModal" class="hidden fixed inset-0 z-[300] bg-black/60 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white/95 dark:bg-slate-900/80 backdrop-blur-2xl w-full max-w-sm rounded-[2.5rem] p-8 border border-white dark:border-white/10 shadow-2xl relative overflow-hidden">
            
            <div id="modal-stage-locator">
                <h3 class="text-xl font-bold mb-6 text-center text-slate-900 dark:text-white">Locate Unit</h3>
                <div class="space-y-4 mb-8">
                    <select id="input-street" class="w-full p-4 bg-slate-200/50 dark:bg-slate-800/50 border-none rounded-2xl text-sm font-bold outline-none text-slate-900 dark:text-white">
                        <option value="" disabled selected>Select Street...</option>
                        <option value="Acacia">Acacia St.</option>
                        <option value="Banyan">Banyan St.</option>
                        <option value="Cedar">Cedar St.</option>
                    </select>
                    <div class="flex gap-2">
                        <input id="input-block" type="number" placeholder="Block" class="w-1/2 p-4 bg-slate-200/50 dark:bg-slate-800/50 rounded-2xl text-sm font-bold outline-none text-slate-900 dark:text-white text-center">
                        <input id="input-lot" type="number" placeholder="Lot" class="w-1/2 p-4 bg-slate-200/50 dark:bg-slate-800/50 rounded-2xl text-sm font-bold outline-none text-slate-900 dark:text-white text-center">
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <button onclick="identifyHomeowner()" class="w-full py-4 bg-waterDark text-white rounded-2xl font-black uppercase tracking-widest text-xs active:scale-95 transition-all">Identify Unit</button>
                    <button onclick="closeReadingModal()" class="w-full py-3 text-slate-500 font-bold uppercase text-[10px] tracking-widest text-center">Cancel reading</button>
                </div>
            </div>

            <div id="modal-stage-reading" class="hidden">
                <div class="text-center mb-6">
                    <h4 id="display-homeowner" class="text-lg font-black text-slate-900 dark:text-white">...</h4>
                    <p id="display-acc-id" class="text-[10px] text-waterDark font-bold tracking-widest uppercase">ACC-000</p>
                </div>
                <div class="bg-slate-200/50 dark:bg-slate-800/50 p-6 rounded-3xl mb-4 text-center">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Current Reading (m³)</label>
                    <input id="input-reading" type="number" step="0.1" placeholder="000.0" class="w-full text-center text-5xl font-black bg-transparent text-waterDark outline-none">
                </div>
                <div class="flex justify-between px-4 mb-8">
                    <div class="text-left">
                        <span class="text-[9px] text-slate-500 block uppercase font-bold">Previous</span>
                        <span id="display-prev" class="font-bold text-sm text-slate-900 dark:text-white">0.0 m³</span>
                    </div>
                    <div class="text-right">
                        <span class="text-[9px] text-slate-500 block uppercase font-bold">Estimated PHP</span>
                        <span id="display-cost" class="font-black text-sm text-emerald-600 dark:text-emerald-500">₱ 0.00</span>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="resetModalState()" class="flex-1 py-4 text-slate-500 font-bold uppercase text-xs">Back</button>
                    <button onclick="showConfirmation()" class="flex-1 py-4 bg-waterDark text-white rounded-2xl font-bold uppercase text-xs active:scale-95">Submit</button>
                </div>
            </div>

            <div id="modal-stage-confirm" class="hidden">
                <h3 class="text-xl font-bold mb-6 text-center text-slate-900 dark:text-white uppercase">Confirm Data</h3>
                <div id="confirm-summary" class="space-y-3 bg-slate-200/50 dark:bg-slate-800/50 p-6 rounded-3xl mb-8 text-xs"></div>
                <div class="flex gap-3">
                    <button onclick="backToReading()" class="flex-1 py-4 text-slate-500 font-bold uppercase text-xs">No</button>
                    <button id="final-submit-btn" onclick="submitReading()" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-bold uppercase text-xs shadow-lg active:scale-95">Yes, Upload</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>

    <script type="module">
        import { injectHeader } from '../js/header-component.js';
        import { db, auth } from '../js/firebase-init.js';
        import { toast, formatCurrency } from '../js/utils.js';

        injectHeader();

        let activeAccount = null;
        let billingConfig = { threshold: 15, minFee: 200, excessRate: 15 };

        const fetchConfig = async () => {
            const snap = await db.ref('config/billing').once('value');
            if (snap.exists()) {
                billingConfig = snap.val();
                updateRateUI();
            }
        };

        const updateRateUI = () => {
            document.getElementById('rate-summary-text').innerText = `1st ${billingConfig.threshold}m³ @ ₱${billingConfig.minFee} + ₱${billingConfig.excessRate}/m³ excess`;
            document.getElementById('rate-min-fee').innerText = formatCurrency(billingConfig.minFee);
        };

        const updateHUDStats = async () => {
            const hSnap = await db.ref('homeowners').once('value');
            const rSnap = await db.ref('readings').once('value');
            const total = hSnap.exists() ? Object.keys(hSnap.val()).length : 0;
            const captured = rSnap.exists() ? Object.values(rSnap.val()).filter(r => {
                const start = new Date().setHours(0,0,0,0);
                return r.timestamp >= start;
            }).length : 0;

            const pct = total > 0 ? Math.round((captured / total) * 100) : 0;
            document.getElementById('display-progress-pct').innerHTML = `${pct}<span class="text-lg opacity-50 ml-1">%</span>`;
            document.getElementById('display-counts').innerText = `${captured} / ${total} Units`;
            document.getElementById('remaining-units').innerText = `${total - captured} Units`;
            document.getElementById('progress-bar').style.width = `${pct}%`;
        };

        const calculateAmount = (curr, prev) => {
            const consumption = Math.max(0, curr - prev);
            if (consumption <= billingConfig.threshold) return billingConfig.minFee;
            return billingConfig.minFee + ((consumption - billingConfig.threshold) * billingConfig.excessRate);
        };

        fetchConfig();

        const renderFeed = (readings) => {
            const container = document.getElementById('readings-feed');
            container.innerHTML = '';
            const latest = Object.values(readings).reverse().slice(0, 6);
            latest.forEach((r, idx) => {
                const opacity = Math.max(0.1, 1 - (idx * 0.18));
                const div = document.createElement('div');
                div.className = 'console-entry';
                div.style.opacity = opacity;
                div.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black uppercase text-slate-900 dark:text-white">${r.accountId}</span>
                        <span class="text-[9px] text-slate-500 font-bold">${new Date(r.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                    <div class="font-mono text-sm font-black text-waterDark dark:text-water">
                        ${r.reading.toFixed(1)} <span class="text-[8px] opacity-60">m³</span>
                    </div>
                `;
                container.appendChild(div);
            });
        };

        window.openReadingModal = () => {
            document.getElementById('readingModal').classList.remove('hidden');
            window.resetModalState();
        };
        window.closeReadingModal = () => document.getElementById('readingModal').classList.add('hidden');
        window.resetModalState = () => {
            document.getElementById('modal-stage-locator').classList.remove('hidden');
            document.getElementById('modal-stage-reading').classList.add('hidden');
            document.getElementById('modal-stage-confirm').classList.add('hidden');
            document.getElementById('input-reading').value = '';
        };

        window.identifyHomeowner = async () => {
            const street = document.getElementById('input-street').value;
            const block = document.getElementById('input-block').value;
            const lot = document.getElementById('input-lot').value;
            if(!street || !block || !lot) return toast("Surgical requirement: Complete location details", "info");

            const snapshot = await db.ref('homeowners').once('value');
            const homeowners = snapshot.val();
            activeAccount = null;
            for(let id in homeowners) {
                const h = homeowners[id];
                if(h.street === street && h.block == block && h.lot == lot) {
                    activeAccount = { id, ...h };
                    break;
                }
            }
            if(activeAccount) {
                document.getElementById('modal-stage-locator').classList.add('hidden');
                document.getElementById('modal-stage-reading').classList.remove('hidden');
                document.getElementById('display-homeowner').innerText = activeAccount.name;
                document.getElementById('display-acc-id').innerText = activeAccount.id;
                document.getElementById('display-prev').innerText = `${activeAccount.lastReading} m³`;
            } else { toast("Unit not found", "error"); }
        };

        document.getElementById('input-reading').addEventListener('input', (e) => {
            const amount = calculateAmount(parseFloat(e.target.value) || 0, activeAccount?.lastReading || 0);
            document.getElementById('display-cost').innerText = formatCurrency(amount);
        });

        window.showConfirmation = () => {
            const reading = parseFloat(document.getElementById('input-reading').value);
            if(isNaN(reading) || reading <= activeAccount.lastReading) return toast("Reading must be higher than previous", "info");
            document.getElementById('modal-stage-reading').classList.add('hidden');
            document.getElementById('modal-stage-confirm').classList.remove('hidden');
            document.getElementById('confirm-summary').innerHTML = `
                <div class="flex justify-between"><span>Homeowner</span><span class="font-black text-right">${activeAccount.name}</span></div>
                <div class="flex justify-between"><span>Street</span><span class="font-black">${activeAccount.street}</span></div>
                <div class="flex justify-between"><span>Block / Lot</span><span class="font-black">B${activeAccount.block} L${activeAccount.lot}</span></div>
                <div class="border-t border-slate-300 dark:border-slate-700 mt-2 pt-2 flex justify-between text-sm">
                    <span class="font-bold">Reading</span><span class="text-waterDark dark:text-water font-black">${reading.toFixed(1)} m³</span>
                </div>
            `;
        };

        window.backToReading = () => {
            document.getElementById('modal-stage-confirm').classList.add('hidden');
            document.getElementById('modal-stage-reading').classList.remove('hidden');
        };

        window.submitReading = async () => {
            const reading = parseFloat(document.getElementById('input-reading').value);
            const btn = document.getElementById('final-submit-btn');
            btn.innerText = "..."; btn.disabled = true;
            try {
                const readingData = {
                    accountId: activeAccount.id,
                    readerId: auth.currentUser.uid,
                    reading: reading,
                    prevReading: activeAccount.lastReading,
                    consumption: reading - activeAccount.lastReading,
                    timestamp: Date.now(),
                    status: 'pending',
                    appliedRates: { ...billingConfig },
                    estimatedAmount: calculateAmount(reading, activeAccount.lastReading)
                };
                await db.ref('readings').push(readingData);
                await db.ref(`homeowners/${activeAccount.id}`).update({ lastReading: reading });
                toast("Captured & Audited", "success");
                updateHUDStats();
                closeReadingModal();
            } catch (e) { toast("Transmission Failed", "error"); }
            finally { btn.innerText = "Yes, Upload"; btn.disabled = false; }
        };

        db.ref('readings').limitToLast(10).on('value', (snap) => {
            updateHUDStats();
            if(snap.exists()) renderFeed(snap.val());
        });

        // Seed Helper (Run once in console if needed)
        window.seedConfig = () => {
            db.ref('config/billing').set({
                threshold: 15,
                minFee: 200,
                excessRate: 15,
                setBy: "INITIAL_SETUP",
                updatedAt: Date.now()
            });
            toast("Billing Config Seeded", "success");
        };
        
        auth.onAuthStateChanged(user => { if (!user) window.location.href = '../index.html'; });
    </script>
</body>
</html>
