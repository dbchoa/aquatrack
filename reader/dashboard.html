<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AquaTrack Reader</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="toast-container"></div>

    <header>
        <span style="font-weight: 800; letter-spacing: -0.02em; display: flex; align-items: center; gap: 8px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
            AquaTrack <span style="color: var(--text-muted); font-weight: 400;">Reader</span>
        </span>
        <div style="display: flex; gap: 12px; align-items: center;">
            <button class="btn-icon" id="theme-toggle" aria-label="Toggle Theme">
                <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
            <button class="btn btn-secondary" id="logout-btn" style="width: auto; padding: 0.5rem 1rem; font-size: 0.85rem;">Logout</button>
        </div>
    </header>

    <div class="container">
        <div class="welcome-card">
            <h2 id="welcome-msg">Mabuhay!</h2>
            <p class="text-muted">Field Operations Overview</p>
        </div>

        <div class="dash-row">
            <div class="dash-item">
                <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 4px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span class="dash-label">To Read</span>
                </div>
                <div class="dash-value" id="count-pending">--</div>
            </div>
            <div class="dash-item">
                <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 4px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    <span class="dash-label">Completed</span>
                </div>
                <div class="dash-value" id="count-done">--</div>
            </div>
        </div>

        <div class="card">
            <h3 style="font-size: 1.1rem; font-weight: 700;">Capture Reading</h3>
            <p class="text-muted mt-1">Ready to sync new meter data to the office? Use the scanner to input values.</p>
            
            <button class="btn btn-primary mt-1" onclick="window.location.href='read-meter.html'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                Open Meter Scanner
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script type="module">
        import { logout } from '../js/auth.js';
        import { requireRole, setTheme, initTheme } from '../js/utils.js';

        initTheme();
        requireRole('reader');

        const name = sessionStorage.getItem('aqt_user_name') || 'Reader';
        document.getElementById('welcome-msg').textContent = `Mabuhay, ${name}!`;

        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.onclick = () => {
            const currentTheme = document.documentElement.dataset.theme;
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        };

        document.getElementById('logout-btn').onclick = logout;
    </script>
</body>
</html>
