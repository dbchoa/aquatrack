<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reader Dashboard - AquaTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { water: '#4facfe', waterDark: '#00f2fe' },
                    borderRadius: { '32': '32px', '48': '48px' }
                }
            }
        }
    </script>
    <style>
        /* Gamer-Water HUD Elements */
        .stat-glow {
            text-shadow: 0 0 15px rgba(79, 172, 254, 0.4);
        }
        .dash-row {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(15, 23, 42, 0.05);
        }
        .dark .dash-row {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .dash-row:hover {
            transform: translateY(-2px) scale(1.01);
            background: white;
            box-shadow: 0 15px 30px -10px rgba(79, 172, 254, 0.2);
        }
        .dark .dash-row:hover {
            background: rgba(30, 41, 59, 0.7);
            box-shadow: 0 15px 40px -15px rgba(0, 0, 0, 0.5);
        }
        .btn-droplet {
            background: radial-gradient(circle at 30% 30%, #7dd3fc, #4facfe);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#020617] font-sans text-slate-900 dark:text-slate-100 transition-colors duration-300">
    
    <header></header>

    <main class="max-w-xl mx-auto p-6 pt-24 pb-32">
        
        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="glass-card p-6 rounded-32 border border-white dark:border-slate-800 shadow-xl bg-white/50 dark:bg-slate-900/50">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">My Zone</p>
                <h3 id="display-zone" class="text-2xl font-light tracking-tight text-water stat-glow">---</h3>
            </div>
            <div class="glass-card p-6 rounded-32 border border-white dark:border-slate-800 shadow-xl bg-white/50 dark:bg-slate-900/50">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Month Logs</p>
                <h3 id="display-readings" class="text-3xl font-bold tracking-tighter text-slate-800 dark:text-white">0</h3>
            </div>
        </div>

        <div class="flex items-center justify-between mb-6 px-2">
            <h2 class="text-sm font-bold uppercase tracking-[0.2em] text-slate-400">Recent Readings</h2>
            <div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-800 ml-4 opacity-50"></div>
        </div>

        <div id="readings-feed" class="space-y-4">
            <div class="text-center py-20 text-slate-400 animate-pulse uppercase text-[10px] tracking-widest font-bold">
                Synchronizing Meter Data...
            </div>
        </div>

    </main>

    <div class="fixed bottom-8 left-0 w-full flex justify-center z-50">
        <button onclick="window.location.href='read-meter.html'" 
            class="btn-droplet px-10 py-5 rounded-full text-white text-xs font-bold uppercase tracking-[0.2em] shadow-2xl shadow-water/40 hover:scale-105 active:scale-95 transition-all">
            Capture New Reading
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script type="module">
        import { injectHeader } from '../js/header-component.js';
        import { toast, debug } from '../js/utils.js';
        import { db, auth } from '../js/firebase-init.js';

        // 1. Setup Navigation
        injectHeader("Reader Dashboard");

        // 2. Fetch Dashboard Data
        const loadDashboard = async () => {
            const user = auth.currentUser;
            if (!user) return;

            // [Inference] Fetching reader profile and logs
            try {
                const snapshot = await db.ref(`users/${user.uid}`).once('value');
                const userData = snapshot.val();
                
                if (userData) {
                    document.getElementById('display-zone').innerText = userData.assignedZone || "Zone A";
                }

                // Fetch recent logs
                const logsRef = db.ref('readings').orderByChild('readerId').equalTo(user.uid).limitToLast(10);
                logsRef.on('value', (snap) => {
                    const logs = snap.val();
                    renderLogs(logs);
                });

            } catch (err) {
                toast("Sync failed. Check connection.", "error");
            }
        };

        const renderLogs = (logs) => {
            const container = document.getElementById('readings-feed');
            if (!logs) {
                container.innerHTML = `<div class="text-center py-20 text-slate-400 italic text-xs">No readings captured this month.</div>`;
                return;
            }

            container.innerHTML = Object.entries(logs).reverse().map(([id, data]) => `
                <div class="dash-row p-6 rounded-32 flex items-center justify-between">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-water uppercase tracking-widest mb-1">${data.accountName || 'Unnamed Account'}</span>
                        <span class="text-xs font-medium text-slate-400">${new Date(data.timestamp).toLocaleDateString()}</span>
                    </div>
                    <div class="text-right">
                        <span class="text-xl font-bold tracking-tighter dark:text-white text-slate-800">${data.currentReading} m³</span>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('display-readings').innerText = Object.keys(logs).length;
        };

        auth.onAuthStateChanged((user) => {
            if (user) loadDashboard();
            else window.location.href = '../index.html';
        });
    </script>
</body>
</html>
