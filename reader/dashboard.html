<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AquaTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { water: '#4facfe' },
                    borderRadius: { '32': '32px', '48': '48px' }
                }
            }
        }
    </script>
    <style>
        .stat-glow { text-shadow: 0 0 15px rgba(79, 172, 254, 0.4); }
        .dash-row {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(15, 23, 42, 0.05);
        }
        .dark .dash-row {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .dash-row:hover {
            transform: translateY(-2px);
            background: white;
            box-shadow: 0 10px 25px -5px rgba(79, 172, 254, 0.15);
        }
        .dark .dash-row:hover {
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(79, 172, 254, 0.3);
        }

        /* GLASS VESSEL HUD! */
        .glass-vessel {
            position: relative;
            width: 72px;
            height: 72px;
            background: #011030; 
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4);
            transform: translate3d(0, 0, 0);
        }

        .water-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 85%;
            background: linear-gradient(to bottom, #4facfe 0%, #0072ff 50%, #003366 100%);
        }

        .water-fill::before {
            content: "";
            position: absolute;
            top: -165%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: #011030; 
            border-radius: 38%;
            animation: slosh 5s linear infinite;
        }

        .glass-vessel::after {
            content: "";
            position: absolute;
            top: 5px;
            left: 12px;
            width: 25px;
            height: 12px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: rotate(-15deg);
            z-index: 25;
            pointer-events: none;
        }

        @keyframes slosh {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#020617] font-sans text-slate-900 dark:text-slate-100 transition-colors duration-300">
    
    <header></header>

    <main class="max-w-xl mx-auto p-6 pt-12 pb-44">
        
        <div class="mb-10 text-center">
            <h2 class="text-3xl font-black tracking-tighter text-slate-800 dark:text-white uppercase">Reader Dashboard</h2>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.4em] mt-2 opacity-60">Field Telemetry Terminal</p>
        </div>
        
        <div class="glass-card p-8 rounded-48 border-b-4 border-water mb-8 bg-white/50 dark:bg-slate-900/50 shadow-2xl relative overflow-hidden">
            <div class="flex justify-between items-end relative z-10">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-1">Cycle Completion</p>
                    <h3 id="display-progress-pct" class="text-5xl font-black tracking-tighter dark:text-white stat-glow">84<span class="text-lg opacity-50 text-water ml-1">%</span></h3>
                </div>
                <div class="text-right">
                    <span id="display-counts" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-water">168 / 200 Units</span>
                </div>
            </div>
            <div class="w-full h-2 bg-slate-200 dark:bg-slate-800 rounded-full mt-8 overflow-hidden">
                <div id="progress-bar" class="h-full bg-water shadow-[0_0_15px_#4facfe] transition-all duration-1000 ease-out" style="width: 84%"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="glass-card p-6 rounded-32 bg-white/40 dark:bg-slate-900/40 border border-white dark:border-slate-800">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Current Sector</p>
                <h4 id="active-street" class="text-xl font-bold dark:text-white truncate">Acacia St.</h4>
            </div>
            <div class="glass-card p-6 rounded-32 bg-white/40 dark:bg-slate-900/40 border border-white dark:border-slate-800">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Remaining</p>
                <h4 id="remaining-units" class="text-xl font-bold text-water">32 Units</h4>
            </div>
        </div>

        <div class="flex items-center justify-between mb-8 px-2">
            <div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-800 mr-6 opacity-40"></div>
            <h2 class="text-[11px] font-black uppercase tracking-[0.25em] text-slate-400">Activity Log</h2>
            <div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-800 ml-6 opacity-40"></div>
        </div>

        <div id="readings-feed" class="space-y-4">
            <div class="dash-row p-6 rounded-32 flex items-center justify-between border border-transparent">
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-water uppercase tracking-[0.15em] mb-1">ACC-045</span>
                    <span class="text-[11px] font-medium text-slate-400">Apr 28, 2026</span>
                </div>
                <div class="text-right">
                    <span class="text-xl font-black tracking-tighter dark:text-white text-slate-800">124.5</span>
                    <span class="text-[10px] font-bold text-slate-400 ml-1 uppercase">m³</span>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 z-[110] bg-white/80 dark:bg-[#020617]/80 backdrop-blur-xl border-t border-slate-200 dark:border-white/5 px-6 py-5">
        <div class="max-w-xl mx-auto flex justify-center items-center">
            <button onclick="openReadingModal()" class="relative flex items-center justify-center group active:scale-90 transition-all duration-300">
                <span class="absolute inset-0 rounded-full bg-water animate-ping opacity-20 pointer-events-none"></span>
                <div class="glass-vessel">
                    <div class="water-fill"></div>
                    <div class="absolute inset-0 flex items-center justify-center z-20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white drop-shadow-[0_2px_10px_rgba(0,0,0,0.4)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                        </svg>
                    </div>
                </div>
            </button>
        </div>
    </div>

    <div id="readingModal" class="hidden fixed inset-0 z-[300] bg-black/80 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 border dark:border-slate-800 shadow-2xl relative">
            
            <div id="modal-stage-locator">
                <h3 class="text-xl font-bold mb-6 text-center">Locate Unit</h3>
                <div class="space-y-4 mb-8">
                    <select id="input-street" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl text-sm font-bold outline-none text-center">
                        <option value="" disabled selected>Select Street...</option>
                        <option value="Acacia">Acacia St.</option>
                        <option value="Banyan">Banyan St.</option>
                        <option value="Cedar">Cedar St.</option>
                    </select>
                    <div class="flex gap-2">
                        <input id="input-block" type="number" placeholder="Block" class="w-1/2 p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl text-sm font-bold outline-none text-center">
                        <input id="input-lot" type="number" placeholder="Lot" class="w-1/2 p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl text-sm font-bold outline-none text-center">
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <button onclick="identifyHomeowner()" class="w-full py-4 bg-water text-white rounded-2xl font-black uppercase tracking-widest text-xs active:scale-95 transition-all">Identify Unit</button>
                    <button onclick="closeReadingModal()" class="w-full py-3 text-slate-400 font-bold uppercase text-[10px] tracking-widest">Cancel</button>
                </div>
            </div>

            <div id="modal-stage-reading" class="hidden">
                <div class="text-center mb-6">
                    <h4 id="display-homeowner" class="text-lg font-black dark:text-white">...</h4>
                    <p id="display-acc-id" class="text-[10px] text-water font-bold tracking-widest uppercase">ACC-000</p>
                </div>
                <div class="bg-slate-50 dark:bg-slate-800/50 p-6 rounded-3xl mb-4 text-center">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Current Reading (m³)</label>
                    <input id="input-reading" type="number" step="0.1" placeholder="000.0" class="w-full text-center text-5xl font-light bg-transparent text-water outline-none">
                </div>
                <div class="flex justify-between px-4 mb-8">
                    <div class="text-left">
                        <span class="text-[9px] text-slate-400 block uppercase font-bold">Previous</span>
                        <span id="display-prev" class="font-bold text-sm">0.0 m³</span>
                    </div>
                    <div class="text-right">
                        <span class="text-[9px] text-slate-400 block uppercase font-bold">Estimated PHP</span>
                        <span id="display-cost" class="font-black text-sm text-emerald-500">₱ 0.00</span>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="resetModalState()" class="flex-1 py-4 text-slate-400 font-bold uppercase text-xs">Back</button>
                    <button id="submit-reading-btn" onclick="submitReading()" class="flex-1 py-4 bg-water text-white rounded-2xl font-bold uppercase text-xs">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>

    <script type="module">
        import { injectHeader } from '../js/header-component.js';
        import { db, auth } from '../js/firebase-init.js';

        injectHeader();

        const BILLING_CONFIG = { threshold: 10, minFee: 300, rate: 35 };
        let activeAccount = null;

        // MODAL TOGGLES
        window.openReadingModal = () => {
            document.getElementById('readingModal').classList.remove('hidden');
            window.resetModalState();
        };

        window.closeReadingModal = () => {
            document.getElementById('readingModal').classList.add('hidden');
        };

        window.resetModalState = () => {
            document.getElementById('modal-stage-locator').classList.remove('hidden');
            document.getElementById('modal-stage-reading').classList.add('hidden');
            document.getElementById('input-block').value = '';
            document.getElementById('input-lot').value = '';
            document.getElementById('input-reading').value = '';
        };

        // STAGE 1: IDENTIFY
        window.identifyHomeowner = async () => {
            const street = document.getElementById('input-street').value;
            const block = document.getElementById('input-block').value;
            const lot = document.getElementById('input-lot').value;

            if(!street || !block || !lot) return alert("Fill all fields");

            const snapshot = await db.ref('homeowners').once('value');
            const homeowners = snapshot.val();
            
            activeAccount = null;
            for(let id in homeowners) {
                const h = homeowners[id];
                if(h.street === street && h.block == block && h.lot == lot) {
                    activeAccount = { id, ...h };
                    break;
                }
            }

            if(activeAccount) {
                document.getElementById('modal-stage-locator').classList.add('hidden');
                document.getElementById('modal-stage-reading').classList.remove('hidden');
                document.getElementById('display-homeowner').innerText = activeAccount.name;
                document.getElementById('display-acc-id').innerText = activeAccount.id;
                document.getElementById('display-prev').innerText = `${activeAccount.lastReading} m³`;
                calculateLiveCost(0);
            } else {
                alert("Homeowner not found.");
            }
        };

        // STAGE 2: CALCULATION
        const calculateLiveCost = (curr) => {
            const prev = activeAccount ? activeAccount.lastReading : 0;
            const consumption = Math.max(0, curr - prev);
            let cost = (consumption <= BILLING_CONFIG.threshold) ? BILLING_CONFIG.minFee : (consumption * BILLING_CONFIG.rate);
            document.getElementById('display-cost').innerText = `₱ ${cost.toFixed(2)}`;
        };

        document.getElementById('input-reading').addEventListener('input', (e) => {
            calculateLiveCost(parseFloat(e.target.value) || 0);
        });

        // SUBMISSION
        window.submitReading = async () => {
            const reading = parseFloat(document.getElementById('input-reading').value);
            if(!reading || reading <= activeAccount.lastReading) return alert("Invalid entry.");
            
            const btn = document.getElementById('submit-reading-btn');
            btn.innerText = "Saving..."; btn.disabled = true;

            try {
                const readingData = {
                    accountId: activeAccount.id,
                    reading: reading,
                    prevReading: activeAccount.lastReading,
                    timestamp: Date.now(),
                    status: 'pending'
                };
                await db.ref('readings').push(readingData);
                await db.ref(`homeowners/${activeAccount.id}`).update({ lastReading: reading });
                alert("Captured Successfully!");
                closeReadingModal();
            } catch (e) { alert("Submission error."); }
            finally { btn.innerText = "Submit"; btn.disabled = false; }
        };

        // EXPOSED SEEDING TOOL
        window.seedTestData = async () => {
            const testAccounts = {
                "ACC-001": { name: "Juan Dela Cruz", street: "Acacia", block: 1, lot: 5, lastReading: 120.5 },
                "ACC-002": { name: "Maria Clara", street: "Banyan", block: 2, lot: 12, lastReading: 85.0 },
                "ACC-003": { name: "Jose Rizal", street: "Acacia", block: 1, lot: 8, lastReading: 210.2 }
            };
            await db.ref('homeowners').set(testAccounts);
            console.log("Database Seeded Successfully.");
        };

        auth.onAuthStateChanged((user) => {
            if (!user) window.location.href = '../index.html';
        });
    </script>
</body>
</html>
