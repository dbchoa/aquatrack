<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaTrack - Secure Access</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast-container"></div>
    <div class="glass-orb orb-1"></div>
    <div class="glass-orb orb-2"></div>

    <div class="container">
        <div class="text-center mb-8">
            <div style="display: inline-flex; align-items: center; justify-content: center; width: 88px; height: 88px; background: var(--surface); border-radius: 28px; box-shadow: var(--shadow-premium); margin-bottom: 1.5rem; border: 1px solid var(--border);">
                <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                </svg>
            </div>
            <h1 style="font-weight: 900; font-size: 3.2rem; letter-spacing: -0.07em; color: var(--text-main); line-height: 0.8;">
                Aqua<span style="color: var(--accent); font-weight: 400;">Track</span>
            </h1>
            <p class="text-muted font-bold" style="letter-spacing: 0.25em; text-transform: uppercase; font-size: 0.65rem; margin-top: 16px; opacity: 0.6;">
                Subdivision Gateway
            </p>
        </div>

        <div class="card mb-6">
            <h2 class="text-center font-bold mb-8" style="font-size: 1.6rem; letter-spacing: -0.04em;">Personnel Access</h2>
            
            <form id="login-form" class="flex flex-col gap-2">
                <div class="form-group mb-6">
                    <label class="mb-2">Personnel ID</label>
                    <input type="email" id="email" placeholder="name@aquatrack.sys" required autocomplete="email">
                </div>

                <div class="form-group mb-6">
                    <label class="mb-2">Access Key</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary mt-4" id="login-btn">
                    <span>Initialize Session</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
        </div>

        <p class="text-center text-muted font-bold" style="font-size: 0.7rem; opacity: 0.4;">
            &copy; 2026 AQUATRACK INFRASTRUCTURE V3.6
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script type="module">
        import { login } from './js/auth.js';
        import { initTheme } from './js/utils.js';
        initTheme();

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span>Verifying...</span>';
            try {
                await login(document.getElementById('email').value, document.getElementById('password').value);
            } catch (err) {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span>Initialize Session</span>';
            }
        });
    </script>
</body>
</html>
