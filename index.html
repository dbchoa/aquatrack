<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaTrack - Secure Access</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific Droplet Aesthetic utilizing style.css variables */
        .btn-droplet {
            background: radial-gradient(circle at 30% 30%, var(--accent-light, #7dd3fc), var(--accent));
            box-shadow: 0 10px 20px -5px var(--accent-alpha);
            border: none;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            outline: none !important;
        }
        .btn-droplet:focus {
            box-shadow: 0 0 0 3px var(--accent-alpha);
        }
        /* Ensure the wrapper respects the stylesheet's centering intent */
        .full-page-center {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="glass-blur">
    <div id="toast-container" class="fixed pt-12 pr-4 z-max" style="top:0; right:0;"></div>
    
    <div class="glass-orb orb-1"></div>
    <div class="glass-orb orb-2"></div>

    <div class="full-page-center">
        <div class="container max-w-md px-6">
            <div class="text-center mb-10">
                <div class="haptic" style="display: inline-flex; align-items: center; justify-content: center; width: 80px; height: 80px; background: var(--surface); border-radius: 24px; box-shadow: var(--shadow-sm); margin-bottom: 1.5rem; border: 1px solid var(--border);">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="var(--accent)">
                        <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                    </svg>
                </div>
                <h1 class="text-4xl font-light tracking-tighter text-main m-0">
                    Aqua<span class="text-accent" style="font-weight: 300;">Track</span>
                </h1>
                <p class="text-muted text-xs uppercase tracking-widest mt-4 opacity-60">Subdivision Gateway</p>
            </div>

            <div class="glass-card glass-blur p-10 mb-8 rounded-32 shadow-xl">
                <h2 class="text-center font-medium text-2xl mb-10 tracking-tight text-main">Sign In</h2>
                
                <form id="login-form" class="flex flex-col gap-6">
                    <div class="form-group">
                        <label class="text-accent text-xs font-bold uppercase tracking-widest ml-2 mb-2 block">Personnel ID</label>
                        <div>
                            <input type="email" id="email" placeholder="name@aquatrack.sys" required autocomplete="email" class="font-medium glass-well rounded-16">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="text-accent text-xs font-bold uppercase tracking-widest ml-2 mb-2 block">Access Key</label>
                        <div>
                            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" class="font-medium glass-well rounded-16">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-droplet mt-6 w-full haptic py-5 rounded-full text-white" id="login-btn">
                        <span class="uppercase tracking-widest text-xs font-bold">Initialize Session</span>
                    </button>
                </form>
            </div>

            <p class="text-center text-muted font-medium text-xs uppercase tracking-widest opacity-40">
                &copy; 2026 AQUATRACK INFRASTRUCTURE
            </p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script type="module">
        import { login } from './js/auth.js';
        import { initTheme } from './js/utils.js';
        
        initTheme();

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginBtn.disabled = true;
            const originalContent = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="uppercase tracking-widest text-xs font-bold">Verifying...</span>';
            
            try {
                await login(document.getElementById('email').value, document.getElementById('password').value);
            } catch (err) {
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalContent;
            }
        });
    </script>
</body>
</html>
