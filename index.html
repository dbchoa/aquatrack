<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaTrack - Authorized Personnel Gateway</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="glass-blur">
    <div id="toast-container" class="fixed pt-12 pr-4 z-max" style="top:0; right:0;"></div>
    
    <div class="glass-orb orb-1"></div>
    <div class="glass-orb orb-2"></div>

    <div class="container flex flex-col justify-center h-screen">
        <div class="text-center mb-12">
            <div class="flex items-center justify-center mx-auto mb-6 haptic" style="width: 92px; height: 92px; background: var(--surface); border-radius: 28px; box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1); border: 1px solid var(--border);">
                <svg class="icon text-accent icon-bold icon-lg icon-glow" viewBox="0 0 24 24">
                    <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                </svg>
            </div>
            <h1 class="text-3xl font-black tracking-tight text-main m-0" style="line-height: 0.8;">
                Aqua<span class="text-accent font-normal">Track</span>
            </h1>
            <p class="text-muted font-black uppercase tracking-widest text-xs mt-4" style="opacity: 0.8;">
                Subdivision Infrastructure
            </p>
        </div>

        <div class="glass-card glass-blur mb-8">
            <h2 class="text-center font-black text-lg mb-8 tracking-tight text-main">Sign In</h2>
            
            <form id="login-form" class="flex flex-col gap-6">
                <div class="form-group">
                    <label class="text-accent text-xs font-black uppercase tracking-widest ml-2">Personnel ID</label>
                    <div class="glass-well">
                        <input type="email" id="email" placeholder="name@aquatrack.sys" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label class="text-accent text-xs font-black uppercase tracking-widest ml-2">Access Key</label>
                    <div class="glass-well">
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary mt-4 w-full haptic" id="login-btn">
                    <span class="uppercase tracking-widest text-xs font-black">Initiate Session</span>
                    <svg class="icon ml-2" width="20" height="20" viewBox="0 0 24 24" style="stroke-width: 4;">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
        </div>

        <p class="text-center text-muted font-bold text-xs uppercase tracking-widest" style="opacity: 0.4;">
            &copy; 2026 AQUATRACK SYSTEMS V4.3
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script type="module">
        import { login } from './js/auth.js';
        import { initTheme } from './js/utils.js';
        
        // Immediate Theme Application
        initTheme();

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Visual Interaction Feedback
            loginBtn.disabled = true;
            const originalContent = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="uppercase tracking-widest text-xs font-black">Verifying...</span>';

            try {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                await login(email, password);
            } catch (err) {
                // Revert state on rejection
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalContent;
            }
        });
    </script>
</body>
</html>
