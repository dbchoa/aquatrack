<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaTrack - Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        water: '#4facfe',
                        waterDark: '#00f2fe',
                    },
                    borderRadius: {
                        '32': '32px',
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Droplet Effect that Tailwind can't quite do solo */
        .btn-droplet {
            background: radial-gradient(circle at 30% 30%, #7dd3fc, #4facfe);
            transition: all 0.2s ease;
        }
        .btn-droplet:active { transform: scale(0.98); }
        /* Remove default focus ring for a custom rounded one */
        input:focus, button:focus { outline: none !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <div id="toast-container" class="fixed top-0 right-0 pt-12 pr-4 z-50"></div>

    <div class="min-h-screen flex flex-col items-center justify-center p-6">
        
        <div class="flex flex-col items-center mb-10">
            <div class="w-20 h-20 bg-white rounded-3xl shadow-sm flex items-center justify-center border border-slate-100 mb-6">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="#4facfe">
                    <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                </svg>
            </div>
            <h1 class="text-4xl font-light tracking-tighter text-slate-800">
                Aqua<span class="text-water font-normal">Track</span>
            </h1>
            <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-400 mt-2">Subdivision Gateway</p>
        </div>

        <div class="w-full max-w-md bg-white/80 backdrop-blur-md p-10 rounded-32 shadow-xl shadow-slate-200/50 border border-white">
            <h2 class="text-center text-xl font-medium text-slate-700 mb-10">Sign In</h2>
            
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="text-[10px] uppercase tracking-widest font-bold text-water mb-2 ml-1 block">Personnel ID</label>
                    <input type="email" id="email" placeholder="name@aquatrack.sys" required 
                        class="w-full p-4 bg-slate-100/50 border border-slate-200 rounded-2xl focus:border-water focus:ring-4 focus:ring-water/10 transition-all font-normal">
                </div>

                <div>
                    <label class="text-[10px] uppercase tracking-widest font-bold text-water mb-2 ml-1 block">Access Key</label>
                    <input type="password" id="password" placeholder="••••••••" required 
                        class="w-full p-4 bg-slate-100/50 border border-slate-200 rounded-2xl focus:border-water focus:ring-4 focus:ring-water/10 transition-all font-normal">
                </div>

                <button type="submit" id="login-btn" 
                    class="btn-droplet w-full py-5 rounded-full text-white text-xs font-bold uppercase tracking-widest shadow-lg shadow-water/30 haptic mt-4">
                    Initialize Session
                </button>
            </form>
        </div>

        <p class="mt-10 text-[10px] font-bold text-slate-400 uppercase tracking-widest opacity-50">
            &copy; 2026 AQUATRACK INFRASTRUCTURE
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    
    <script type="module">
        import { login } from './js/auth.js';
        import { initTheme } from './js/utils.js';
        
        initTheme();

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginBtn.disabled = true;
            const originalText = loginBtn.innerText;
            loginBtn.innerText = 'VERIFYING...';
            
            try {
                await login(document.getElementById('email').value, document.getElementById('password').value);
            } catch (err) {
                loginBtn.disabled = false;
                loginBtn.innerText = originalText;
            }
        });
    </script>
</body>
</html>
