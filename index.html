<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaTrack - Secure Access</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="glass-blur flex items-center justify-center">
    <div id="toast-container" class="fixed pt-12 pr-4 z-max" style="top:0; right:0;"></div>
    
    <div class="glass-orb orb-1"></div>
    <div class="glass-orb orb-2"></div>

    <div class="container max-w-md px-6 v-center">
        <div class="text-center mb-8">
            <div class="haptic" style="display: inline-flex; align-items: center; justify-content: center; width: 88px; height: 88px; background: var(--surface); border-radius: 28px; box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1); margin-bottom: 1.5rem; border: 1px solid var(--border);">
                <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                </svg>
            </div>
            <h1 class="text-3xl font-black tracking-tighter text-main m-0" style="line-height: 0.8;">
                Aqua<span class="text-accent" style="font-weight: 400;">Track</span>
            </h1>
            <p class="text-muted font-bold uppercase tracking-widest text-xs mt-4" style="opacity: 0.6;">
                Subdivision Gateway
            </p>
        </div>

        <div class="glass-card glass-blur p-8 mb-6 rounded-32">
            <h2 class="text-center font-black text-xl mb-8 tracking-tighter text-main">Personnel Access</h2>
            
            <form id="login-form" class="flex flex-col gap-2">
                <div class="form-group mb-4">
                    <label class="text-accent text-xs font-black uppercase tracking-widest ml-2 mb-2 block">Personnel ID</label>
                    <div class="glass-well">
                        <input type="email" id="email" placeholder="name@aquatrack.sys" required autocomplete="email" class="font-medium">
                    </div>
                </div>

                <div class="form-group mb-4">
                    <label class="text-accent text-xs font-black uppercase tracking-widest ml-2 mb-2 block">Access Key</label>
                    <div class="glass-well">
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" class="font-medium">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary mt-4 w-full haptic h-auto py-4 rounded-lg" id="login-btn">
                    <span class="uppercase tracking-widest text-xs font-black">Initialize Session</span>
                    <svg class="icon ml-2" width="20" height="20" viewBox="0 0 24 24" style="stroke: white; stroke-width: 4;">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
        </div>

        <p class="text-center text-muted font-bold text-xs uppercase tracking-widest" style="opacity: 0.4;">
            &copy; 2026 AQUATRACK INFRASTRUCTURE V4.7
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script type="module">
        import { login } from './js/auth.js';
        import { initTheme } from './js/utils.js';
        initTheme();

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginBtn.disabled = true;
            const originalContent = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="uppercase tracking-widest text-xs font-black">Verifying...</span>';
            try {
                await login(document.getElementById('email').value, document.getElementById('password').value);
            } catch (err) {
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalContent;
            }
        });
    </script>
</body>
</html>
